<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio - Monitor de Posiciones</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff5500; 
            --primary-glow: rgba(255, 85, 0, 0.4);
            --sup: #d00000; 
            --sup-glow: rgba(208, 0, 0, 0.4);
            --bg: #0a0a0a; 
            --sidebar: #000; 
            --card: #1a1a1a; 
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #222; text-align: center; }
        .sidebar-header h2 { font-size: 0.9rem; color: var(--primary); margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .menu { flex: 1; padding: 20px 0; overflow-y: auto; }
        .menu-item { padding: 14px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; transition: all 0.3s; border-left: 4px solid transparent; font-size: 0.85rem; }
        .menu-item:hover { background: #111; color: white; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: bold; }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .top-bar { padding: 0 30px; height: 70px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        /* Map & Pins */
        .map-viewport { flex: 1; overflow: auto; padding: 40px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }
        .map-container { position: relative; display: inline-block; }
        .map-img { display: block; max-width: 85vw; max-height: 75vh; height: auto; width: auto; }

        .pin {
            position: absolute; width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: 900; color: white; border: 2.5px solid #fff; 
            transform: translate(-50%, -50%); cursor: pointer; z-index: 10;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .pin::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            animation: pulse 2s infinite; z-index: -1;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }

        .pin-sup { background: var(--sup); border-radius: 8px; }
        .pin-sup::after { background: var(--sup-glow); }
        .pin-vol { background: var(--primary); }
        .pin-vol::after { background: var(--primary-glow); }
        .pin:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 100; box-shadow: 0 0 25px rgba(255,255,255,0.5); }

        /* Modal */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); z-index: 1000; }
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #111; width: 90%; max-width: 450px; border-radius: 16px; z-index: 1001; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .modal-header { padding: 20px; background: #f8f8f8; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 30px; }
        .close-btn { background: #000; color: white; border: none; width: 100%; padding: 20px; cursor: pointer; font-weight: bold; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><h2>Panel Logístico</h2></div>
        <div class="menu">
            <div class="menu-item active" onclick="loadView('all')"><i class="fas fa-th-large"></i> MAPA GENERAL</div>
            <div class="menu-item" onclick="loadView('ZONA 1')"><i class="fas fa-map-marker-alt"></i> ZONA 1</div>
            <div class="menu-item" onclick="loadView('ZONA 2')"><i class="fas fa-map-marker-alt"></i> ZONA 2</div>
            <div class="menu-item" onclick="loadView('ZONA 3')"><i class="fas fa-map-marker-alt"></i> ZONA 3</div>
            <div class="menu-item" onclick="loadView('ZONA 4')"><i class="fas fa-map-marker-alt"></i> ZONA 4</div>
            <div class="menu-item" onclick="loadView('ZONA 5')"><i class="fas fa-map-marker-alt"></i> ZONA 5</div>
            <div class="menu-item" onclick="loadView('ZONA 6')"><i class="fas fa-map-marker-alt"></i> ZONA 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <h1 id="view-title" style="margin:0; font-weight: 300; font-size: 1.1rem; letter-spacing: 1px;">MAPA GENERAL</h1>
            <div style="font-size: 0.8rem; color: #888;"><i class="fas fa-info-circle"></i> Toca un número para ver función</div>
        </header>

        <div class="map-viewport">
            <div class="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header">
            <span id="m-label" style="font-weight: 900; color: var(--primary); font-size: 1.2rem;"></span>
            <span id="m-radio" style="font-size: 0.7rem; background: #000; color: #fff; padding: 4px 10px; border-radius: 20px; font-weight: bold;"></span>
        </div>
        <div class="modal-body">
            <h2 id="m-zone-title" style="margin: 0 0 15px 0; font-size: 1.6rem; color: #000; border-bottom: 3px solid var(--primary); display: inline-block; padding-bottom: 5px;"></h2>
            <p id="m-task" style="color: #333; font-size: 1rem; line-height: 1.6; margin: 0;"></p>
        </div>
        <button class="close-btn" onclick="closeModal()">Entendido</button>
    </div>

    <script>
        const appData = {
            positions: [
                {id: 1, type: 'sup', zone: 'ZONA 1-4', label: 'SUPERVISOR DERECHO', radio: 'CON RADIO', t: 22, l: 72, task: 'Organiza voluntarios zona derecha. Responsable de check-in, uniforme, conocimiento de lazos y número de sillas. Supervisa oración espiritual y reporta al Coordinador.'},
                {id: 2, type: 'vol', zone: 'ZONA 1', label: 'PUESTO #2', radio: 'CON RADIO', t: 8, l: 78, task: 'Ubicación de abajo hacia arriba (Papás SPK). Sostiene cuerda abajo zona 1. Coloca forros negros (fila 1 y mitad).'},
                {id: 3, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #3', radio: '-', t: 25, l: 74, task: 'Fila 5 es fila de paso. Reserva alabanza/líderes. Capas de lluvia en rampa Zona 1. Salida: sostiene lazo arriba (sale primero prioridad).'},
                {id: 4, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #4', radio: '-', t: 38, l: 76, task: 'Apoya acomodación y caritas felices. Salida: saca últimas 4 filas por la última fila de zona 2, demás por escalera interna.'},
                {id: 5, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #5', radio: 'CON RADIO', t: 15, l: 85, task: 'Responsable zona arriba. Papás SPK fines de semana. Reserva Traducción. Coloca 3 forros negros. Salida: sostiene lazo abajo.'},
                {id: 6, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #6', radio: '-', t: 10, l: 90, task: 'Apoya ingreso a sillas. En salida sostiene lazo y dirige salida de nuevos con caritas felices.'},
                {id: 7, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #7', radio: 'CON RADIO', t: 26, l: 68, task: 'Acomodación abajo hacia arriba. Reserva Comité/Staff. Salida: alterna filas derecha/izquierda por escalera interna.'},
                {id: 8, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #8', radio: '-', t: 34, l: 70, task: 'Sostiene bandera para nuevos y los dirige a Orientación Centro. Salida: sostiene lazo en la parte baja.'},
                {id: 9, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #9', radio: '-', t: 50, l: 74, task: 'Semáforo baños. Control de flujo para evitar doble vía. Salida: realiza la "L" con el lazo para ampliar flujo.'},
                {id: 10, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #10', radio: 'CON RADIO', t: 36, l: 52, task: 'Reserva líderes. Sostiene bandera para nuevos. Salida alterna derecha/izquierda. Pendiente de salida Zona 5.'},
                {id: 11, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #11', radio: '-', t: 52, l: 50, task: 'Semáforo baños escalera izquierda. Evita doble vía. En salida realiza la "L" con el lazo.'},
                {id: 12, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #12', radio: 'CON RADIO', t: 58, l: 70, task: 'Capas lluvia alternas debajo de sillas. Salida: sostiene cuerda abajo coordinando con centro derecho.'},
                {id: 13, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #13', radio: '-', t: 65, l: 72, task: 'Apoya logística, guía nuevos con caritas felices. Salida: sostiene lazo en la parte de arriba.'},
                {id: 14, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #14', radio: 'CON RADIO', t: 58, l: 48, task: 'Ubicación abajo-arriba. 2 forros negros. Salida: sostiene lazo abajo, alterna filas.'},
                {id: 15, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #15', radio: '-', t: 65, l: 45, task: 'Apoya acomodación y caritas felices. Salida: se ubica arriba para dirigir flujo.'},
                {id: 16, type: 'sup', zone: 'ZONA 5-6', label: 'SUPERVISOR IZQUIERDO', radio: 'CON RADIO', t: 21, l: 51, task: 'Supervisa rampas, centros y caracol lobby. Controla contadores e ingresos prioritarios. Responsable puestos 16 al 30.'},
                {id: 17, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #17', radio: 'CON RADIO', t: 28, l: 45, task: 'Responsable prioritarios y sillas de ruedas. Capas lluvia en rampa izq. Salida: sale primero prioridad.'},
                {id: 18, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #18', radio: '-', t: 35, l: 43, task: 'Apoya reserva líderes y prioritarios. Salida: sostiene lazo abajo y dirige nuevos a rampa.'},
                {id: 19, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #19', radio: 'CON RADIO', t: 48, l: 40, task: 'Responsable ingreso por rampa. 3 forros negros. Salida: coordina con centro izquierdo envío de filas.'},
                {id: 20, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #20', radio: '-', t: 55, l: 38, task: 'Apoya ingreso hacia las silla según corresponda. En salida sostiene el lazo.'},
                {id: 21, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #21', radio: 'CON RADIO', t: 15, l: 35, task: 'Dirige hacia arriba. Capas lluvia debajo de sillas (2-3 paquetes). Salida: lazo abajo. Nuevos por rampa Betel.'},
                {id: 22, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #22', radio: '-', t: 8, l: 32, task: 'Dirige ubicación arriba. Anima asistentes para salida. Pendiente de nuevos hacia Betel.'},
                {id: 23, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #23', radio: '-', t: 5, l: 28, task: 'Ubicado al final de la zona. Dirige acomodación y toma lazo para salida de iglesia y nuevos.'},
                {id: 24, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #24', radio: '-', t: 12, l: 40, task: 'Ubica iglesia abajo hacia arriba. Capas fila 1. Salida: sostiene cuerda abajo tras zona 8. Dirige por escalera interna.'},
                {id: 25, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #25', radio: 'CON RADIO', t: 18, l: 30, task: 'Apoya logística. Salida: arriba sostiene lazo, dirige últimas 4 filas hacia rampa Betel.'},
                {id: 26, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #26', radio: 'CON RADIO', t: 30, l: 18, task: 'Zona extensa. Dirige asistentes hacia arriba. Salida: sostiene lazo abajo. Nuevos por rampa Betel.'},
                {id: 27, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #27', radio: '-', t: 22, l: 12, task: 'Apoya ubicación arriba. Anima salida y vigila nuevos por rampa Betel.'},
                {id: 28, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #28', radio: '-', t: 10, l: 10, task: 'Dirige asistentes por fila de paso hacia rincón derecho. Salida por rampa Betel.'}
            ]
        };

        function loadView(zoneKey) {
            const layer = document.getElementById('pins-layer');
            const title = document.getElementById('view-title');
            layer.innerHTML = '';
            
            title.innerText = zoneKey === 'all' ? 'MAPA GENERAL' : `VISTA: ${zoneKey}`;

            appData.positions.forEach(p => {
                if (zoneKey === 'all' || p.zone === zoneKey) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    div.style.top = p.t + '%';
                    div.style.left = p.l + '%';
                    div.innerHTML = `<span>${p.id}</span>`;
                    div.onclick = () => showInfo(p);
                    layer.appendChild(div);
                }
            });

            document.querySelectorAll('.menu-item').forEach(m => {
                m.classList.remove('active');
                if(m.innerText === zoneKey || (zoneKey === 'all' && m.innerText.includes('GENERAL'))) m.classList.add('active');
            });
        }

        function showInfo(p) {
            document.getElementById('m-label').innerText = p.label;
            document.getElementById('m-radio').innerText = p.radio === 'CON RADIO' ? '📻 RADIO ACTIVO' : 'SIN RADIO';
            document.getElementById('m-zone-title').innerText = p.zone;
            document.getElementById('m-task').innerText = p.task;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = () => loadView('all');
    </script>
</body>
</html>
