<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio - Vistas por Zona</title>
    <style>
        :root { --primary: #ff5500; --bg: #1a1a1a; --sidebar-w: 220px; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menú Lateral */
        .sidebar { width: var(--sidebar-w); background: #111; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 20px 0; }
        .sidebar h2 { font-size: 1.1em; padding: 0 20px; margin-bottom: 20px; color: var(--primary); font-weight: 300; }
        .menu-item { padding: 12px 20px; cursor: pointer; transition: 0.3s; border-left: 4px solid transparent; font-size: 0.9em; color: #ccc; }
        .menu-item:hover { background: #222; color: white; }
        .menu-item.active { background: #222; border-left-color: var(--primary); color: white; font-weight: bold; }

        /* Contenedor Principal */
        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 20px; position: relative; }
        .map-container { position: relative; width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .map-image { width: 100%; display: block; }

        /* Pines numerados */
        .pin {
            position: absolute; width: 24px; height: 24px; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
            cursor: pointer; border: 2px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.4); z-index: 10;
        }
        .pin-sup { background: #d00000; }
        .pin-vol { background: var(--primary); }

        /* Modals y Overlay (Manteniendo tu estilo elegante) */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; color: #333; border-radius: 15px; z-index: 1000; width: 90%; max-width: 400px; border-top: 10px solid var(--primary); box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .modal-header { background: #f8f8f8; padding: 15px; border-bottom: 1px solid #eee; }
        .modal-body { padding: 20px; font-size: 0.95em; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; backdrop-filter: blur(4px); }
        .close-btn { background: #333; color: white; border: none; width: 100%; padding: 12px; cursor: pointer; border-radius: 0 0 15px 15px; }

        /* Leyenda flotante */
        .legend { margin-top: 15px; display: flex; gap: 15px; font-size: 0.8em; opacity: 0.7; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <h2>LOGÍSTICA</h2>
        <div class="menu-item active" onclick="changeView('general', 'mapas.png')">Mapa General</div>
        <div class="menu-item" onclick="changeView('z1', 'zona1.png')">Zona 1</div>
        <div class="menu-item" onclick="changeView('z2', 'zona2.png')">Zona 2</div>
        <div class="menu-item" onclick="changeView('z3', 'zona3.png')">Zona 3</div>
        <div class="menu-item" onclick="changeView('z4', 'zona4.png')">Zona 4</div>
        <div class="menu-item" onclick="changeView('z5', 'zona5.png')">Zona 5</div>
        <div class="menu-item" onclick="changeView('z6', 'zona6.png')">Zona 6</div>
    </nav>

    <main class="main-content">
        <h1 id="view-title" style="font-weight: 300; margin-bottom: 20px;">Mapa General</h1>
        
        <div class="map-container" id="map-frame">
            <img src="mapas.png" id="main-img" class="map-image">
            <div id="pins-layer"></div> </div>

        <div class="legend">
            <span style="color:#d00000;">● Supervisor</span>
            <span style="color:#ff5500;">● Voluntario</span>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header"><h3 id="m-pos" style="margin:0"></h3></div>
        <div class="modal-body" id="m-desc"></div>
        <button class="close-btn" onclick="closeModal()">CERRAR</button>
    </div>

    <script>
        const allPins = {
            general: [
                {id: 1, t: 22, l: 72, type: 'sup'}, {id: 2, t: 6, l: 77.5, type: 'vol'},
                {id: 16, t: 21, l: 51.5, type: 'sup'}, {id: 26, t: 30, l: 17.5, type: 'vol'}
                // Aquí irían todos los IDs para la vista general
            ],
            z1: [ {id: 1, t: 40, l: 30, type: 'sup'}, {id: 2, t: 20, l: 60, type: 'vol'} ], // Coordenadas ajustadas al zoom de zona1.png
            z6: [ {id: 26, t: 50, l: 40, type: 'vol'}, {id: 27, t: 60, l: 30, type: 'vol'} ]
        };

        const dataInfo = {
            1: { pos: "Supervisor Derecho", name: "Laura Arias", desc: "Supervisa zonas 1 a 4." },
            26: { pos: "Zona 6 Arriba", name: "Arnulfo Canchila", desc: "Salida por rampa Betel." }
        };

        function changeView(zone, imgFile) {
            // Actualizar UI del menú
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // Cambiar imagen y título
            document.getElementById('main-img').src = imgFile;
            document.getElementById('view-title').innerText = event.currentTarget.innerText;

            // Limpiar y cargar pines de esa zona específica
            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';
            
            const pins = allPins[zone] || [];
            pins.forEach(p => {
                const div = document.createElement('div');
                div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                div.style.top = p.t + '%';
                div.style.left = p.l + '%';
                div.innerText = p.id;
                div.onclick = () => showInfo(p.id);
                layer.appendChild(div);
            });
        }

        function showInfo(id) {
            const info = dataInfo[id] || { pos: "Puesto "+id, name: "Asignado", desc: "Función logística." };
            document.getElementById('m-pos').innerText = info.pos;
            document.getElementById('m-desc').innerHTML = `<strong>Responsable:</strong> ${info.name}<br><br>${info.desc}`;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        // Cargar vista inicial
        window.onload = () => changeView('general', 'mapas.png');
    </script>
</body>
</html>
