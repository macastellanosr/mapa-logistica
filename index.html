<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Auditorio - Pro Fix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff5500; 
            --sup: #d00000; 
            --bg: #0a0a0a; 
            --sidebar-bg: #111; /* Un poco más claro para contraste */
            --card: #1a1a1a; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR CORREGIDO --- */
        .sidebar { 
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid #333; 
            display: flex; flex-direction: column; 
            z-index: 5000; /* AUMENTADO: Por encima del overlay */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); left: 0; top: 0; }
            .sidebar.open { transform: translateX(0); box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        }

        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 0.9rem; color: var(--primary); letter-spacing: 2px; margin: 0; font-weight: 800; }
        
        .close-sidebar { background: #222; border: none; color: white; width: 35px; height: 35px; border-radius: 50%; display: none; cursor: pointer; }
        @media (max-width: 768px) { .close-sidebar { display: flex; align-items: center; justify-content: center; } }

        .menu { flex: 1; padding: 15px 0; overflow-y: auto; }
        .menu-item { 
            padding: 16px 25px; cursor: pointer; color: #bbb; display: flex; 
            align-items: center; gap: 15px; border-left: 4px solid transparent; 
            transition: 0.2s; font-size: 0.95rem; 
        }
        .menu-item i { width: 20px; text-align: center; }
        .menu-item.active { background: #222; color: #fff; border-left-color: var(--primary); }

        /* --- MAIN --- */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; z-index: 10; }
        .top-bar { padding: 0 20px; height: 65px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }

        .menu-toggle {
            background: #222; color: white; border: 1px solid #444; 
            width: 45px; height: 45px; border-radius: 10px; font-size: 1.2rem; cursor: pointer;
            display: none; align-items: center; justify-content: center;
        }
        @media (max-width: 768px) { .menu-toggle { display: flex; } }

        /* --- MAPA --- */
        .map-viewport { flex: 1; overflow: auto; background: #000; position: relative; }
        .map-container { position: relative; display: inline-block; min-width: 1000px; padding: 50px; }
        .map-img { display: block; width: 100%; height: auto; }

        .pin {
            position: absolute; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: 900; color: white; border: 2.5px solid #fff; 
            transform: translate(-50%, -50%); cursor: pointer; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .pin-sup { background: var(--sup); border-radius: 12px; }
        .pin-vol { background: var(--primary); }

        /* --- OVERLAY CORREGIDO --- */
        #overlay { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.7); 
            backdrop-filter: blur(4px); 
            z-index: 4000; /* DEBAJO del sidebar, ENCIMA del mapa */
        }
        
        /* --- MODALES --- */
        #modal { 
            display: none; position: fixed; background: #fff; color: #111; 
            z-index: 6000; /* ENCIMA DE TODO */
            overflow: hidden; transition: all 0.3s ease;
        }

        @media (min-width: 769px) {
            #modal { width: 450px; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); border-radius: 16px; opacity: 0; }
            #modal.open { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            #modal { width: 100%; bottom: 0; left: 0; right: 0; border-radius: 25px 25px 0 0; transform: translateY(100%); }
            #modal.open { transform: translateY(0); }
        }

        .modal-body { padding: 30px; }
        .close-btn { background: #000; color: white; border: none; width: 100%; padding: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeAll()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>AUDITORIO</h2>
            <button class="close-sidebar" onclick="closeAll()"><i class="fas fa-times"></i></button>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="changeView('general')"><i class="fas fa-th-large"></i> MAPA GENERAL</div>
            <div class="menu-item" onclick="changeView('1')"><i class="fas fa-map-marker-alt"></i> ZONA 1</div>
            <div class="menu-item" onclick="changeView('2')"><i class="fas fa-map-marker-alt"></i> ZONA 2</div>
            <div class="menu-item" onclick="changeView('3')"><i class="fas fa-map-marker-alt"></i> ZONA 3</div>
            <div class="menu-item" onclick="changeView('4')"><i class="fas fa-map-marker-alt"></i> ZONA 4</div>
            <div class="menu-item" onclick="changeView('5')"><i class="fas fa-map-marker-alt"></i> ZONA 5</div>
            <div class="menu-item" onclick="changeView('6')"><i class="fas fa-map-marker-alt"></i> ZONA 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h1 id="view-title" style="margin:0; font-size:1rem;">MAPA GENERAL</h1>
            <div style="width:40px"></div>
        </header>

        <div class="map-viewport">
            <div class="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="modal">
        <div class="modal-body">
            <div style="width:40px; height:4px; background:#ddd; margin:-10px auto 20px; border-radius:10px;"></div>
            <div id="modal-content"></div>
        </div>
        <button class="close-btn" onclick="closeAll()">CERRAR</button>
    </div>

    <script>
        // Mismos datos y funciones de antes, pero con la corrección de closeAll
        const mapFiles = { general: "mapas.png", "1": "zona1.png", "2": "zona2.png", "3": "zona3.png", "4": "zona4.png", "5": "zona5.png", "6": "zona6.png" };
        const positions = [
            {id: 1, type: 'sup', zone: 'ZONAS 1,2,3,4', label: 'SUPERVISOR DERECHO', radio: 'RADIO', g: {t:22, l:72}, z: {t:10, l:50}, task: 'Organiza voluntarios zona derecha. Responsable de check-in y logística.'},
            {id: 2, type: 'vol', zone: 'ZONA 1', label: 'PUESTO #2', radio: 'RADIO', g: {t:8, l:78}, z: {t:25, l:40}, task: 'Ubicación abajo-arriba. Papas SPK. Lazo abajo.'},
            {id: 3, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #3', radio: '-', g: {t:25, l:74}, z: {t:35, l:45}, task: 'Fila 5 paso. Reserva alabanza. Capas lluvia.'},
            // ... resto de posiciones igual ...
        ];

        let activeView = 'general';

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAll() {
            // Cerrar menú
            document.getElementById('sidebar').classList.remove('open');
            // Cerrar modal
            const m = document.getElementById('modal');
            m.classList.remove('open');
            // Ocultar overlay tras animación
            setTimeout(() => {
                if(!document.getElementById('sidebar').classList.contains('open') && !m.classList.contains('open')) {
                    document.getElementById('overlay').style.display = 'none';
                    m.style.display = 'none';
                }
            }, 300);
        }

        function changeView(view) {
            activeView = view;
            const map = document.getElementById('main-map');
            map.style.opacity = '0.3';
            setTimeout(() => {
                map.src = mapFiles[view];
                document.getElementById('view-title').innerText = view === 'general' ? 'MAPA GENERAL' : `ZONA ${view}`;
                map.onload = () => { map.style.opacity = '1'; renderPins(); };
            }, 200);
            closeAll();
            
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(view === 'general' ? 'GENERAL' : `ZONA ${view}`)) item.classList.add('active');
            });
        }

        function renderPins() {
            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';
            positions.forEach(p => {
                const isGeneral = activeView === 'general';
                const isMatch = p.zone.includes(`ZONA ${activeView}`);
                const isSup = p.type === 'sup' && (
                    (activeView >= 1 && activeView <= 4 && p.zone.includes('1,2,3,4')) ||
                    (activeView >= 5 && activeView <= 6 && p.zone.includes('5,6'))
                );

                if (isGeneral || isMatch || isSup) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    const pos = isGeneral ? p.g : p.z;
                    div.style.top = pos.t + '%';
                    div.style.left = pos.l + '%';
                    div.innerHTML = p.id;
                    div.onclick = (e) => { e.stopPropagation(); showInfo(p); };
                    layer.appendChild(div);
                }
            });
        }

        function showInfo(p) {
            document.getElementById('modal-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:15px;">
                    <div>
                        <h2 style="margin:0; font-size:1.3rem; color:var(--primary)">${p.label}</h2>
                        <small style="color:#666; font-weight:bold">${p.zone}</small>
                    </div>
                </div>
                <p style="line-height:1.6; color:#333; margin:0;">${p.task}</p>
            `;
            document.getElementById('overlay').style.display = 'block';
            const m = document.getElementById('modal');
            m.style.display = 'block';
            setTimeout(() => m.classList.add('open'), 10);
        }

        window.onload = () => changeView('general');
    </script>
</body>
</html>
