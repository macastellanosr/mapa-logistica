<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio - Mapa de Posiciones</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        h1 { margin: 25px 0 10px 0; font-weight: 300; letter-spacing: 1px; color: #eee; }
        
        /* Contenedor del Mapa */
        .map-container { position: relative; width: 95%; max-width: 1100px; border: 2px solid #444; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .map-image { width: 100%; display: block; }

        /* Estilo de los Pines con ID visible */
        .pin {
            position: absolute; width: 22px; height: 22px; color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
            cursor: pointer; border: 2px solid #fff; box-shadow: 0 3px 6px rgba(0,0,0,0.4); transition: all 0.3s ease; z-index: 10;
        }
        .pin:hover { transform: scale(1.3); box-shadow: 0 0 15px rgba(255,255,255,0.6); }

        /* Colores por Rol según la Leyenda */
        .pin-sup { background: #d00000; } /* Supervisor (Rojo) */
        .pin-vol { background: #ff5500; } /* Voluntario (Naranja) */

        /* Leyenda Estilizada */
        .legend { display: flex; gap: 20px; margin-top: 15px; background: rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 30px; border: 1px solid #444; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.9em; }
        .dot-l { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #fff; }

        /* Modal / Ficha Técnica */
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: #fff; color: #333; border-radius: 15px; z-index: 1000; width: 90%; max-width: 420px; 
            max-height: 80vh; overflow-y: auto; border-top: 10px solid #ff5500; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .modal-header { background: #f8f8f8; padding: 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; }
        .modal-header h3 { margin: 0; color: #ff5500; }
        .modal-body { padding: 20px; line-height: 1.6; font-size: 0.95em; }
        .radio-badge { background: #ff5500; color: white; padding: 2px 8px; border-radius: 5px; font-size: 0.7em; vertical-align: middle; margin-left: 10px; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; backdrop-filter: blur(4px); }
        .close-btn { background: #333; color: white; border: none; width: 100%; padding: 15px; cursor: pointer; font-weight: bold; border-radius: 0 0 15px 15px; }
    </style>
</head>
<body>

    <h1>🗺️ Mapa Logística Auditorio</h1>

    <div class="legend">
        <div class="legend-item"><div class="dot-l" style="background:#d00000;"></div> Supervisor</div>
        <div class="legend-item"><div class="dot-l" style="background:#ff5500;"></div> Voluntario</div>
    </div>

    <div class="map-container" style="margin-top: 20px;">
        <img src="mapas.png" class="map-image">

        <div class="pin pin-sup" style="top: 22%; left: 72%;" onclick="showInfo(1)">1</div>
        <div class="pin pin-vol" style="top: 6%; left: 77.5%;" onclick="showInfo(2)">2</div>
        <div class="pin pin-vol" style="top: 25%; left: 73.5%;" onclick="showInfo(3)">3</div>
        <div class="pin pin-vol" style="top: 38%; left: 76%;" onclick="showInfo(4)">4</div>
        <div class="pin pin-vol" style="top: 48%; left: 77.5%;" onclick="showInfo(5)">5</div>
        <div class="pin pin-vol" style="top: 70%; left: 80.5%;" onclick="showInfo(6)">6</div>
        <div class="pin pin-vol" style="top: 26%; left: 69%;" onclick="showInfo(7)">7</div>
        <div class="pin pin-vol" style="top: 34%; left: 70%;" onclick="showInfo(8)">8</div>
        <div class="pin pin-vol" style="top: 48%; left: 74%;" onclick="showInfo(9)">9</div>
        <div class="pin pin-vol" style="top: 36%; left: 51.5%;" onclick="showInfo(10)">10</div>
        <div class="pin pin-vol" style="top: 50%; left: 50%;" onclick="showInfo(11)">11</div>
        <div class="pin pin-vol" style="top: 59%; left: 71.5%;" onclick="showInfo(12)">12</div>
        <div class="pin pin-vol" style="top: 72%; left: 70.5%;" onclick="showInfo(13)">13</div>
        <div class="pin pin-vol" style="top: 56%; left: 49%;" onclick="showInfo(14)">14</div>
        <div class="pin pin-vol" style="top: 72%; left: 47%;" onclick="showInfo(15)">15</div>

        <div class="pin pin-sup" style="top: 21%; left: 51.5%;" onclick="showInfo(16)">16</div>
        <div class="pin pin-vol" style="top: 26%; left: 47.5%;" onclick="showInfo(17)">17</div>
        <div class="pin pin-vol" style="top: 44%; left: 45.5%;" onclick="showInfo(18)">18</div>
        <div class="pin pin-vol" style="top: 48%; left: 39.5%;" onclick="showInfo(19)">19</div>
        <div class="pin pin-vol" style="top: 55%; left: 36%;" onclick="showInfo(20)">20</div>
        <div class="pin pin-vol" style="top: 56%; left: 14.5%;" onclick="showInfo(21)">21</div>
        <div class="pin pin-vol" style="top: 65%; left: 17%;" onclick="showInfo(22)">22</div>
        <div class="pin pin-vol" style="top: 75%; left: 13.5%;" onclick="showInfo(23)">23</div>
        <div class="pin pin-vol" style="top: 10%; left: 40.5%;" onclick="showInfo(24)">24</div>
        <div class="pin pin-vol" style="top: 16%; left: 34.5%;" onclick="showInfo(25)">25</div>
        <div class="pin pin-vol" style="top: 30%; left: 17.5%;" onclick="showInfo(26)">26</div>
        <div class="pin pin-vol" style="top: 35%; left: 12%;" onclick="showInfo(27)">27</div>
        <div class="pin pin-vol" style="top: 12%; left: 12.5%;" onclick="showInfo(28)">28</div>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header">
            <h3 id="m-pos"></h3>
            <p id="m-name" style="margin: 5px 0 0 0; font-weight: bold; color: #666;"></p>
        </div>
        <div class="modal-body" id="m-desc"></div>
        <button class="close-btn" onclick="closeModal()">ENTENDIDO</button>
    </div>

    <script>
        const data = {
            1: { pos: "1 - Supervisor Derecho", radio: true, name: "Laura Arias", desc: "Supervisa zonas 1 a 4. Control de check-in y uniformes. Gestión de incidencias." },
            2: { pos: "2 - Zona 1", radio: true, name: "Rafael Moncaleano", desc: "Ubicación de abajo hacia arriba. Papás SPK. Sostiene cuerda abajo tras salida zona 3." },
            16: { pos: "16 - Supervisor Izquierdo", radio: true, name: "Juan Castrillón", desc: "Supervisa zonas 5 y 6. Control de flujo en rampas y caracol." },
            26: { pos: "26 - Zona 6 Arriba", radio: true, name: "Arnulfo Canchila", desc: "Dirige hacia arriba. Salida de nuevos por rampa Betel con carita feliz." }
            // Los demás datos se mantienen...
        };

        function showInfo(id) {
            const info = data[id] || { pos: `Puesto ${id}`, name: "Asignado", desc: "Función logística según protocolo de zona." };
            document.getElementById('m-pos').innerHTML = info.pos + (info.radio ? ' <span class="radio-badge">📻 RADIO</span>' : '');
            document.getElementById('m-name').innerText = "Responsable: " + info.name;
            document.getElementById('m-desc').innerText = info.desc;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
