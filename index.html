<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio - Panel Pro (Actualizado)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff5500; 
            --primary-glow: rgba(255, 85, 0, 0.4);
            --sup: #d00000; 
            --sup-glow: rgba(208, 0, 0, 0.4);
            --bg: #0a0a0a; 
            --sidebar: #000; 
            --card: #1a1a1a; 
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #222; text-align: center; }
        .sidebar-header h2 { font-size: 0.9rem; color: var(--primary); margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .menu { flex: 1; padding: 20px 0; overflow-y: auto; }
        .menu-item { padding: 14px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; transition: all 0.3s; border-left: 4px solid transparent; font-size: 0.9rem; }
        .menu-item i { width: 20px; }
        .menu-item:hover { background: #111; color: white; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: bold; }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .top-bar { padding: 0 30px; height: 70px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        /* Pins */
        .map-viewport { flex: 1; overflow: auto; padding: 40px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }
        .map-container { position: relative; display: inline-block; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #333; }
        .map-img { display: block; max-width: 85vw; max-height: 75vh; height: auto; width: auto; opacity: 1; transition: opacity 0.3s; }

        .pin {
            position: absolute; width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 13px; font-weight: 800; color: white; border: 2px solid #fff; 
            transform: translate(-50%, -50%); cursor: pointer; z-index: 10;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .pin::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            animation: pulse 2s infinite; z-index: -1;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2); opacity: 0; } }

        .pin:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 100; box-shadow: 0 0 20px #fff; }
        .pin-sup { background: var(--sup); border-radius: 8px; }
        .pin-sup::after { background: var(--sup-glow); }
        .pin-vol { background: var(--primary); }
        .pin-vol::after { background: var(--primary-glow); }

        /* Modal Refinado */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); z-index: 1000; }
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #111; width: 90%; max-width: 450px; border-radius: 16px; z-index: 1001; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }
        .modal-header { padding: 20px; background: #f8f8f8; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 25px; max-height: 60vh; overflow-y: auto; }
        .close-btn { background: #000; color: white; border: none; width: 100%; padding: 18px; cursor: pointer; font-weight: bold; font-size: 1rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header"><h2>Auditorio Monitor</h2></div>
        <div class="menu">
            <div class="menu-item active" onclick="loadView('all')"><i class="fas fa-th-large"></i> MAPA GENERAL</div>
            <div class="menu-item" onclick="loadView('z1')"><i class="fas fa-door-open"></i> ZONA 1 (SPK)</div>
            <div class="menu-item" onclick="loadView('z2')"><i class="fas fa-chair"></i> ZONA 2 (PRO/ALAB)</div>
            <div class="menu-item" onclick="loadView('z3')"><i class="fas fa-users"></i> ZONA 3 (CENTRO)</div>
            <div class="menu-item" onclick="loadView('z4')"><i class="fas fa-exchange-alt"></i> ZONA 4 (DERECHA)</div>
            <div class="menu-item" onclick="loadView('z5')"><i class="fas fa-chevron-right"></i> ZONA 5 (PRIORIDAD)</div>
            <div class="menu-item" onclick="loadView('z6')"><i class="fas fa-road"></i> ZONA 6 (BETEL)</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <h1 id="view-title" style="margin:0; font-weight: 300; font-size: 1.1rem; letter-spacing: 1px;">MAPA GENERAL</h1>
            <div style="font-size: 0.8rem; color: #888;"><i class="fas fa-broadcast-tower"></i> RADIO ACTIVA</div>
        </header>

        <div class="map-viewport">
            <div class="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header">
            <span id="m-pos" style="font-weight: bold; color: var(--primary); font-size: 0.75rem;"></span>
            <span id="m-radio" style="font-size: 0.7rem; background: #eee; padding: 4px 8px; border-radius: 4px;"></span>
        </div>
        <div class="modal-body">
            <h2 id="m-name" style="margin: 0 0 5px 0; font-size: 1.4rem;"></h2>
            <h4 id="m-zone" style="margin: 0 0 15px 0; color: #666; font-weight: 500; font-size: 0.9rem;"></h4>
            <div style="width: 40px; height: 3px; background: var(--primary); margin-bottom: 15px;"></div>
            <p id="m-task" style="color: #333; font-size: 0.95rem; line-height: 1.6; margin: 0;"></p>
        </div>
        <button class="close-btn" onclick="closeModal()">Cerrar</button>
    </div>

                {id: 25, type: 'vol', zone: 'ZONA 6 Abajo', name: 'Andrea Cifuentes', radio: 'RADIO', t: 18, l: 30, task: 'Apoya logística. Salida: arriba sostiene lazo, dirige últimas 4 filas hacia rampa Betel.'},
                {id: 26, type: 'vol', zone: 'ZONA 6 Arriba', name: 'Arnulfo Enrique Canchila', radio: 'RADIO', t: 30, l: 18, task: 'Responsable zona extensa. Dirige desde abajo hacia arriba. Salida: sostiene lazo abajo. Nuevos por rampa Betel.'},
                {id: 27, type: 'vol', zone: 'ZONA 6 Arriba', name: 'Sin Asignar', radio: '-', t: 22, l: 12, task: 'Apoya ubicación arriba en conjunto con equipo. Anima salida y vigila rampa Betel.'},
                {id: 28, type: 'vol', zone: 'ZONA 6 Arriba', name: 'Ricardo Cuitiva Baracaldo', radio: '-', t: 10, l: 10, task: 'Dirige asistentes por fila de paso hacia rincón derecho. Toma lazo para salida por rampa Betel.'}
            ]
        };

        function loadView(zoneKey) {
            const layer = document.getElementById('pins-layer');
            const title = document.getElementById('view-title');
            layer.innerHTML = '';
            
            title.innerText = zoneKey === 'all' ? 'MAPA GENERAL' : `VISTA: ${zoneKey.toUpperCase()}`;

            appData.positions.forEach(p => {
                const isZoneMatch = zoneKey === 'all' || p.zone.toLowerCase().includes(zoneKey.toLowerCase());
                
                if (isZoneMatch) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    div.style.top = p.t + '%';
                    div.style.left = p.l + '%';
                    div.innerHTML = `<span>${p.id}</span>`;
                    div.onclick = () => showInfo(p);
                    layer.appendChild(div);
                }
            });

            document.querySelectorAll('.menu-item').forEach(m => {
                m.classList.remove('active');
                if(m.innerText.toLowerCase().includes(zoneKey.toLowerCase())) m.classList.add('active');
            });
        }

        function showInfo(p) {
            document.getElementById('m-pos').innerText = `POSICIÓN #${p.id} - ${p.type.toUpperCase()}`;
            document.getElementById('m-radio').innerText = p.radio === 'RADIO' ? '📻 CANAL RADIO' : 'NO RADIO';
            document.getElementById('m-name').innerText = p.name;
            document.getElementById('m-zone').innerText = p.zone;
            document.getElementById('m-task').innerText = p.task;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = () => loadView('all');
    </script>
</body>
</html>
