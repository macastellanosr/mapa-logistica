<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Auditorio - Pro v3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff5500; 
            --sup: #d00000; 
            --bg: #0a0a0a; 
            --sidebar-bg: #000; 
            --card: #1a1a1a; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid #222; 
            display: flex; flex-direction: column; z-index: 2000; transition: transform 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
        }

        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 0.8rem; color: var(--primary); letter-spacing: 2px; margin: 0; text-transform: uppercase; }
        
        .close-sidebar { display: none; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        @media (max-width: 768px) { .close-sidebar { display: block; } }

        .menu-item { padding: 15px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 15px; border-left: 4px solid transparent; transition: 0.2s; font-size: 0.9rem; }
        .menu-item:hover { color: white; background: #111; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: bold; }

        /* --- MAIN CONTENT --- */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
        .top-bar { padding: 0 25px; height: 65px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }

        .menu-toggle {
            display: none; background: var(--primary); color: white; border: none; 
            width: 45px; height: 45px; border-radius: 8px; font-size: 1.2rem; cursor: pointer;
        }
        @media (max-width: 768px) { .menu-toggle { display: flex; justify-content: center; align-items: center; } }

        /* --- MAP AREA --- */
        .map-viewport { flex: 1; overflow: auto; background: #000; position: relative; }
        .map-container { position: relative; display: inline-block; min-width: 1200px; padding: 60px; }
        .map-img { display: block; width: 100%; height: auto; transition: opacity 0.3s ease; }

        .pin {
            position: absolute; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: 900; color: white; border: 2.5px solid #fff; 
            transform: translate(-50%, -50%); cursor: pointer; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.2s;
        }
        .pin-sup { background: var(--sup); border-radius: 12px; }
        .pin-vol { background: var(--primary); }
        .pin:hover { transform: translate(-50%, -50%) scale(1.15); z-index: 150; }

        /* --- MODALES ADAPTATIVOS --- */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 3000; }
        
        /* Contenedor Modal Base */
        #modal { 
            display: none; position: fixed; background: #fff; color: #111; z-index: 3100; 
            overflow: hidden; transition: all 0.3s ease;
        }

        /* ESTILO DESKTOP: Pop-Up Centrado */
        @media (min-width: 769px) {
            #modal {
                width: 450px; top: 50%; left: 50%; 
                transform: translate(-50%, -50%) scale(0.9);
                border-radius: 16px; opacity: 0;
            }
            #modal.open { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* ESTILO MOBILE: Desplegable desde abajo */
        @media (max-width: 768px) {
            #modal {
                width: 100%; bottom: 0; left: 0; right: 0;
                border-radius: 20px 20px 0 0;
                transform: translateY(100%);
            }
            #modal.open { transform: translateY(0); }
        }

        .modal-body { padding: 30px; }
        .modal-drag-handle { width: 40px; height: 5px; background: #ddd; margin: -15px auto 15px; border-radius: 10px; display: none; }
        @media (max-width: 768px) { .modal-drag-handle { display: block; } }

        .close-btn { background: #000; color: white; border: none; width: 100%; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>PANEL LOGÍSTICO</h2>
            <button class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="changeView('general')"><i class="fas fa-map"></i> MAPA GENERAL</div>
            <div class="menu-item" onclick="changeView('1')"><i class="fas fa-layer-group"></i> ZONA 1</div>
            <div class="menu-item" onclick="changeView('2')"><i class="fas fa-layer-group"></i> ZONA 2</div>
            <div class="menu-item" onclick="changeView('3')"><i class="fas fa-layer-group"></i> ZONA 3</div>
            <div class="menu-item" onclick="changeView('4')"><i class="fas fa-layer-group"></i> ZONA 4</div>
            <div class="menu-item" onclick="changeView('5')"><i class="fas fa-layer-group"></i> ZONA 5</div>
            <div class="menu-item" onclick="changeView('6')"><i class="fas fa-layer-group"></i> ZONA 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h1 id="view-title">MAPA GENERAL</h1>
            <div style="width:45px"></div> </header>

        <div class="map-viewport">
            <div class="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeAll()"></div>
    
    <div id="modal">
        <div class="modal-body">
            <div class="modal-drag-handle"></div>
            <div id="modal-content"></div>
        </div>
        <button class="close-btn" onclick="closeAll()">Cerrar</button>
    </div>

    <script>
        const mapFiles = { general: "mapas.png", "1": "zona1.png", "2": "zona2.png", "3": "zona3.png", "4": "zona4.png", "5": "zona5.png", "6": "zona6.png" };

        const positions = [
            // DERECHA (1-15)
            {id: 1, type: 'sup', zone: 'ZONAS 1,2,3,4', label: 'SUPERVISOR DERECHO', radio: 'RADIO', g: {t:22, l:72}, z: {t:10, l:50}, task: 'Organiza voluntarios zona derecha. Responsable de check-in, uniforme, conocimiento de lazos y sillas.'},
            {id: 2, type: 'vol', zone: 'ZONA 1', label: 'PUESTO #2', radio: 'RADIO', g: {t:8, l:78}, z: {t:25, l:40}, task: 'Ubicación abajo-arriba. Papas SPK. Sostiene cuerda abajo. Coloca carita feliz a nuevos.'},
            {id: 3, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #3', radio: '-', g: {t:25, l:74}, z: {t:35, l:45}, task: 'Fila 5 de paso. Dirige a zona 1. Reserva sillas alabanza/líderes. Capas lluvia rampa.'},
            {id: 4, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #4', radio: '-', g: {t:38, l:76}, z: {t:55, l:50}, task: 'Apoya acomodación. Coloca carita feliz a nuevos. Salida últimas 4 filas por atrás.'},
            {id: 5, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #5', radio: 'RADIO', g: {t:15, l:85}, z: {t:20, l:80}, task: 'Responsable zona arriba. Ubicación abajo-arriba. Reserva Traducción. Papás SPKS.'},
            {id: 6, type: 'vol', zone: 'ZONA 2', label: 'PUESTO #6', radio: '-', g: {t:10, l:90}, z: {t:15, l:85}, task: 'Apoya ingreso a sillas. Salida: sostiene lazo y dirige salida de nuevos.'},
            {id: 7, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #7', radio: 'RADIO', g: {t:26, l:68}, z: {t:35, l:45}, task: 'Acomodación abajo-arriba. Reservas Comité/Staff/Líderes. Salida alterna filas.'},
            {id: 8, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #8', radio: '-', g: {t:34, l:70}, z: {t:45, l:50}, task: 'Apoya logística. Sostiene bandera al llamado de nuevos y los dirige a Orientación.'},
            {id: 9, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #9', radio: '-', g: {t:50, l:74}, z: {t:80, l:70}, task: 'Semáforo Escalera Derecha. Coordina salida a baños. En salida hace la "L".'},
            {id: 10, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #10', radio: 'RADIO', g: {t:36, l:52}, z: {t:45, l:35}, task: 'Lado Izquierdo. Reservas Supervisor. Primeras filas líderes. Sostiene bandera.'},
            {id: 11, type: 'vol', zone: 'ZONA 3', label: 'PUESTO #11', radio: '-', g: {t:52, l:50}, z: {t:80, l:35}, task: 'Semáforo Escalera Izquierda. Coordina salida a baños. En salida hace la "L".'},
            {id: 12, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #12', radio: 'RADIO', g: {t:58, l:70}, z: {t:65, l:70}, task: 'Lado Derecho. Ubicación abajo-arriba. 2 forros negros. Capas lluvia alternas.'},
            {id: 13, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #13', radio: '-', g: {t:65, l:72}, z: {t:78, l:75}, task: 'Apoya logística. Guía nuevos y coloca carita feliz. Sostiene lazo arriba.'},
            {id: 14, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #14', radio: 'RADIO', g: {t:58, l:48}, z: {t:65, l:30}, task: 'Lado Izquierdo. 2 forros negros. Salida alterna derecha/izquierda.'},
            {id: 15, type: 'vol', zone: 'ZONA 4', label: 'PUESTO #15', radio: '-', g: {t:65, l:45}, z: {t:78, l:25}, task: 'Apoya logística y salida de nuevos. Sostiene lazo arriba en salida.'},

            // IZQUIERDA (16-28)
            {id: 16, type: 'sup', zone: 'ZONAS 5,6', label: 'SUPERVISOR IZQUIERDO', radio: 'RADIO', g: {t:21, l:51}, z: {t:10, l:50}, task: 'Supervisa rampas, centros e ingresos prioritarios. Responsable puestos 16 al 28.'},
            {id: 17, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #17', radio: 'RADIO', g: {t:28, l:45}, z: {t:40, l:30}, task: 'Responsable prioritarios y sillas de ruedas. Capas lluvia en rampa.'},
            {id: 18, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #18', radio: '-', g: {t:35, l:43}, z: {t:50, l:35}, task: 'Apoya reserva líderes. Salida: lazo abajo y dirige nuevos a rampa.'},
            {id: 19, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #19', radio: 'RADIO', g: {t:48, l:40}, z: {t:65, l:40}, task: 'Ingreso abajo-arriba sobre rampa. 3 forros negros. Coordina envío de filas.'},
            {id: 20, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #20', radio: '-', g: {t:55, l:38}, z: {t:75, l:45}, task: 'Apoya ingreso a sillas. En salida sostiene el lazo.'},
            {id: 21, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #21', radio: 'RADIO', g: {t:15, l:35}, z: {t:25, l:20}, task: 'Capas lluvia debajo sillas. Salida: lazo abajo. Nuevos por rampa Betel.'},
            {id: 22, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #22', radio: '-', g: {t:8, l:32}, z: {t:15, l:20}, task: 'Ubicación arriba. Anima salida. Pendiente de nuevos hacia Betel.'},
            {id: 23, type: 'vol', zone: 'ZONA 5', label: 'PUESTO #23', radio: '-', g: {t:5, l:28}, z: {t:5, l:15}, task: 'Final de zona. Dirige acomodación. Lazo para salida de iglesia y nuevos.'},
            {id: 24, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #24', radio: '-', g: {t:12, l:40}, z: {t:20, l:50}, task: 'Ubica iglesia abajo-arriba. Capas fila 1. Sostiene cuerda abajo.'},
            {id: 25, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #25', radio: 'RADIO', g: {t:18, l:30}, z: {t:30, l:35}, task: 'Salida: arriba sostiene lazo, dirige últimas 4 filas hacia rampa Betel.'},
            {id: 26, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #26', radio: 'RADIO', g: {t:30, l:18}, z: {t:45, l:20}, task: 'Dirige desde abajo hacia arriba. Salida: lazo abajo. Nuevos por Betel.'},
            {id: 27, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #27', radio: '-', g: {t:22, l:12}, z: {t:35, l:15}, task: 'Apoya ubicación arriba. Anima salida y vigila nuevos por rampa Betel.'},
            {id: 28, type: 'vol', zone: 'ZONA 6', label: 'PUESTO #28', radio: '-', g: {t:10, l:10}, z: {t:15, l:10}, task: 'Dirige por fila de paso hacia rincón. Salida por rampa Betel.'}
        ];

        let currentView = 'general';

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.getElementById('overlay').style.display = sb.classList.contains('open') ? 'block' : 'none';
        }

        function changeView(view) {
            currentView = view;
            const map = document.getElementById('main-map');
            map.style.opacity = '0.3';
            
            setTimeout(() => {
                map.src = mapFiles[view];
                document.getElementById('view-title').innerText = view === 'general' ? 'MAPA GENERAL' : `ZONA ${view}`;
                map.onload = () => { map.style.opacity = '1'; renderPins(); };
            }, 200);

            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').style.display = 'none';
            }

            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(view === 'general' ? 'GENERAL' : `ZONA ${view}`)) item.classList.add('active');
            });
        }

        function renderPins() {
            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';
            positions.forEach(p => {
                const isGeneral = currentView === 'general';
                const isMatch = p.zone.includes(`ZONA ${currentView}`);
                const isSup = p.type === 'sup' && (
                    (currentView >= 1 && currentView <= 4 && p.zone.includes('1,2,3,4')) ||
                    (currentView >= 5 && currentView <= 6 && p.zone.includes('5,6'))
                );

                if (isGeneral || isMatch || isSup) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    const pos = isGeneral ? p.g : p.z;
                    div.style.top = pos.t + '%';
                    div.style.left = pos.l + '%';
                    div.innerHTML = p.id;
                    div.onclick = (e) => { e.stopPropagation(); showInfo(p); };
                    layer.appendChild(div);
                }
            });
        }

        function showInfo(p) {
            document.getElementById('modal-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:15px;">
                    <div>
                        <h2 style="margin:0; font-size:1.3rem; color:var(--primary)">${p.label}</h2>
                        <small style="color:#666; font-weight:bold">${p.zone}</small>
                    </div>
                    <span style="background:#000; color:#fff; padding:5px 12px; border-radius:20px; font-size:0.7rem;">
                        ${p.radio === 'RADIO' ? '📻 RADIO' : 'SIN RADIO'}
                    </span>
                </div>
                <p style="line-height:1.6; color:#333; font-size:1rem; margin:0;">${p.task}</p>
            `;
            document.getElementById('overlay').style.display = 'block';
            const m = document.getElementById('modal');
            m.style.display = 'block';
            setTimeout(() => m.classList.add('open'), 10);
        }

        function closeAll() {
            const m = document.getElementById('modal');
            m.classList.remove('open');
            document.getElementById('sidebar').classList.remove('open');
            setTimeout(() => {
                m.style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
            }, 300);
        }

        window.onload = () => changeView('general');
    </script>
</body>
</html>
