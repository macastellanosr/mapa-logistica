<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio - Puestos de Control</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; }
        .map-container { position: relative; width: 98%; max-width: 1100px; margin: 20px; border: 3px solid #333; border-radius: 12px; background: #000; overflow: hidden; }
        .map-image { width: 100%; display: block; opacity: 0.9; }
        
        /* Estilo de los cuadros rojos interactivos */
        .dot {
            position: absolute; width: 2.8%; height: 3.2%;
            border: 2px solid #ff0000; background: rgba(255, 0, 0, 0.2);
            cursor: pointer; transition: all 0.2s; z-index: 10;
        }
        .dot:hover { background: rgba(255, 0, 0, 0.6); transform: scale(1.2); box-shadow: 0 0 10px #ff0000; }

        /* Modal / Ficha técnica */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: white; color: #222; border-radius: 12px; z-index: 1000; 
                 width: 90%; max-width: 400px; max-height: 85vh; overflow-y: auto; 
                 box-shadow: 0 15px 40px rgba(0,0,0,0.7); border-top: 10px solid #ff0000; }
        
        .modal-header { padding: 15px; border-bottom: 1px solid #ddd; background: #f9f9f9; position: sticky; top: 0; }
        .modal-body { padding: 20px; font-size: 0.95em; line-height: 1.5; }
        .radio-tag { background: #ff0000; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                   background: rgba(0,0,0,0.8); z-index: 999; backdrop-filter: blur(3px); }
        
        .close-btn { background: #222; color: white; border: none; width: 100%; padding: 12px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="margin-top: 20px; font-weight: 300;">📍 Puestos Logísticos: Auditorio Principal</h2>

    <div class="map-container">
        <img src="mapas.png" class="map-image">

        <div class="dot" style="top: 15.5%; left: 77.5%;" onclick="showInfo(1)"></div>
        <div class="dot" style="top: 25.5%; left: 69.5%;" onclick="showInfo(2)"></div>
        <div class="dot" style="top: 27.5%; left: 71.5%;" onclick="showInfo(3)"></div>
        <div class="dot" style="top: 31%; left: 71.5%;" onclick="showInfo(4)"></div>
        <div class="dot" style="top: 35.5%; left: 72%;" onclick="showInfo(5)"></div>
        <div class="dot" style="top: 40%; left: 72%;" onclick="showInfo(6)"></div>
        <div class="dot" style="top: 45%; left: 71.3%;" onclick="showInfo(7)"></div>
        <div class="dot" style="top: 50.5%; left: 71.3%;" onclick="showInfo(9)"></div>
        <div class="dot" style="top: 14.5%; left: 45.2%;" onclick="showInfo(13)"></div>
        <div class="dot" style="top: 28%; left: 46.5%;" onclick="showInfo(17)"></div>
        <div class="dot" style="top: 33.5%; left: 46.5%;" onclick="showInfo(18)"></div>
        <div class="dot" style="top: 43.5%; left: 47%;" onclick="showInfo(19)"></div>
        <div class="dot" style="top: 55%; left: 47.5%;" onclick="showInfo(21)"></div>
        <div class="dot" style="top: 32%; left: 24.5%;" onclick="showInfo(24)"></div>
        <div class="dot" style="top: 42%; left: 28.5%;" onclick="showInfo(25)"></div>
        <div class="dot" style="top: 14.5%; left: 20.2%;" onclick="showInfo(26)"></div>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header">
            <h3 id="m-pos" style="margin:0; color:#d00;"></h3>
            <p id="m-name" style="margin:5px 0 0 0; font-size: 0.9em; color: #555;"></p>
        </div>
        <div class="modal-body">
            <strong>Función y Responsabilidades:</strong>
            <p id="m-desc"></p>
        </div>
        <button class="close-btn" onclick="closeModal()">CERRAR</button>
    </div>

    <script>
        const data = {
            1: { pos: "1 - Supervisor Derecho", radio: true, name: "Laura Daniela Arias Fontecha", desc: "Supervisa zonas 1, 2, 3 y 4. Realiza check-in, verifica uniformes y conocimiento de lazos. Coordina oratoria espiritual con voluntarios." },
            2: { pos: "2 - ZONA 1", radio: true, name: "Rafael Moncaleano / Gloria Parra", desc: "Ubicación de abajo hacia arriba. Papas SPK en fin de semana. Sostiene cuerda tras salida de zona 3. Coordina con escalera interna." },
            3: { pos: "3 - ZONA 2 Abajo", radio: false, name: "Marleny Masmela", desc: "Reserva sillas para alabanza. Dirige salida de nuevos con capas de lluvia. En salida sostiene lazo en parte superior." },
            4: { pos: "4 - ZONA 2 Abajo", radio: false, name: "Edith Pertuz", desc: "Apoya acomodación. Coloca carita feliz a nuevos. Saca últimas 4 filas por rampa lateral." },
            5: { pos: "5 - ZONA 2 Arriba", radio: true, name: "Carlos Julio González", desc: "Responsable de ingreso. Gestiona reserva de Traducción. Coloca forros negros en baranda y centro." },
            6: { pos: "6 - ZONA 2 Arriba", radio: false, name: "Adriana Alfonso", desc: "Apoya ingreso y ubicación manual. Sostiene lazo en salida para dirigir flujo." },
            7: { pos: "7 - ZONA 3 Derecha", radio: true, name: "Maritriny Barrera", desc: "Ingreso de abajo hacia arriba. Reservas de Comité y Staff. Salida alterna: una fila derecha, otra izquierda." },
            9: { pos: "9 - Semáforo Escalera", radio: false, name: "Marcela Páez", desc: "Coordina flujo de baños con puerta de vidrio para evitar doble vía. Hace la 'L' con lazo en la salida." },
            13: { pos: "13 - ZONA 4 Derecha", radio: true, name: "Jose Carrillo", desc: "Responsable de zona. Ubica capas de lluvia bajo primera silla. Coordina salida con centro derecho." },
            17: { pos: "17 - ZONA 5 Abajo", radio: true, name: "Sonia Patricia López", desc: "Dirige asistentes por rampa zona 6. Ubica prioritarios y sillas de ruedas en primeras filas. Sostiene lazo arriba." },
            18: { pos: "18 - ZONA 5 Abajo", radio: false, name: "Jaqueline Arias", desc: "Apoya acomodación de sillas de ruedas y acompañantes. Gestión de 50 sillas de líderes." },
            19: { pos: "19 - ZONA 5", radio: true, name: "July Jiménez", desc: "Ingreso por rampa. Coloca 3 forros negros. En salida coordina con centro izquierdo el envío de filas." },
            21: { pos: "21 - ZONA 5 Arriba", radio: true, name: "Gloria Milena González", desc: "Dirige hacia parte superior. Ubica forros negros en baranda y puerta. Salida de nuevos por rampa Betel." },
            24: { pos: "24 - ZONA 6 Abajo", radio: false, name: "Martha Lucía Ceballos", desc: "Ubicación abajo hacia arriba. Sostiene cuerda abajo. Coordina salida por escalera interna tras zona 8." },
            25: { pos: "25 - ZONA 6 Abajo", radio: true, name: "Andrea Cifuentes", desc: "Apoya logística. En salida dirige las últimas 4 filas por rampa Betel. Coloca carita feliz." },
            26: { pos: "26 - ZONA 6 Arriba", radio: true, name: "Arnulfo Canchila", desc: "Zona extensa: se ubica abajo para dirigir hacia arriba. Salida por rampa Betel con carita feliz." }
        };

        function showInfo(id) {
            const item = data[id] || { pos: `Puesto ${id}`, name: "En revisión", desc: "Información logística pendiente." };
            document.getElementById('m-pos').innerHTML = item.pos + (item.radio ? ' <span class="radio-tag">RADIO</span>' : '');
            document.getElementById('m-name').innerText = "Responsable: " + item.name;
            document.getElementById('m-desc').innerText = item.desc;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
