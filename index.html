<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio PRO</title>
    <style>
        :root { --primary: #ff5500; --sup: #d00000; --bg: #121212; --card: #1e1e1e; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Adaptable */
        .sidebar { width: 260px; background: #000; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #222; text-align: center; }
        .sidebar-header h2 { font-size: 1rem; color: var(--primary); margin: 0; }
        
        .menu { flex: 1; overflow-y: auto; padding: 10px 0; }
        .menu-item { padding: 15px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #888; border-left: 4px solid transparent; }
        .menu-item:hover { background: #1a1a1a; color: white; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: bold; }

        /* Contenido Principal */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        .top-bar { padding: 15px; background: #1a1a1a; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        
        .map-wrapper { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 10px; position: relative; background: #000; }
        .map-container { position: relative; display: inline-block; background: white; border-radius: 4px; }
        .map-img { max-width: none; height: auto; display: block; }

        /* Pines táctiles para Mobile */
        .pin {
            position: absolute; width: 26px; height: 26px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold;
            color: white; border: 2px solid #fff; transform: translate(-50%, -50%);
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10;
        }
        .pin-sup { background: var(--sup); }
        .pin-vol { background: var(--primary); }

        /* Modal Mobile-First */
        #modal { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: white; color: #333; 
                  border-radius: 20px 20px 0 0; z-index: 2000; padding: 25px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); 
                  transform: translateY(100%); transition: transform 0.3s ease; }
        #modal.open { display: block; transform: translateY(0); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 1500; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: -260px; height: 100%; }
            .sidebar.open { left: 0; }
            .map-img { width: 1000px; } /* Forzamos tamaño para scroll en móvil */
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>LOGÍSTICA AUDITORIO</h2></div>
        <div class="menu">
            <div class="menu-item active" onclick="loadView('general')">🌐 Mapa General</div>
            <div class="menu-item" onclick="loadView('zona1')">📍 Zona 1</div>
            <div class="menu-item" onclick="loadView('zona2')">📍 Zona 2</div>
            <div class="menu-item" onclick="loadView('zona3')">📍 Zona 3</div>
            <div class="menu-item" onclick="loadView('zona4')">📍 Zona 4</div>
            <div class="menu-item" onclick="loadView('zona5')">📍 Zona 5</div>
            <div class="menu-item" onclick="loadView('zona6')">📍 Zona 6</div>
        </div>
    </nav>

    <main class="main">
        <div class="top-bar">
            <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">☰</button>
            <h3 id="current-title" style="margin:0; font-size:0.9rem;">Mapa General</h3>
            <div style="font-size:0.7rem; color:#888;">ID Visible</div>
        </div>

        <div class="map-wrapper">
            <div class="map-container" id="container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <h2 id="m-pos" style="margin:0; color:var(--primary); font-size:1.2rem;"></h2>
        <p id="m-name" style="font-weight:bold; margin:10px 0; color:#555;"></p>
        <p id="m-desc" style="font-size:0.9rem; line-height:1.5; color:#666;"></p>
        <button onclick="closeModal()" style="width:100%; padding:15px; margin-top:15px; border-radius:10px; border:none; background:#333; color:white; font-weight:bold;">CERRAR</button>
    </div>

    <script>
        // JSON CENTRALIZADO: Toda la información en un solo lugar
        const config = {
            views: {
                general: { img: 'mapas.png', title: 'Mapa General', show: 'all' },
                zona1: { img: 'zona1.png', title: 'Zona 1 - Detalle', show: [1, 2, 3, 4] },
                zona6: { img: 'zona6.png', title: 'Zona 6 - Detalle', show: [24, 25, 26, 27, 28] }
            },
            positions: [
                {id: 1, t: 22, l: 72, type: 'sup', name: 'Laura Arias', task: 'Supervisor Derecho. Control de radio.'},
                {id: 2, t: 6, l: 77.5, type: 'vol', name: 'Rafael Moncaleano', task: 'Zona 1: Papás SPK.'},
                {id: 3, t: 25, l: 73.5, type: 'vol', name: 'Marleny Masmela', task: 'Zona 2: Sillas alabanza.'},
                {id: 4, t: 38, l: 76, type: 'vol', name: 'Edith Pertuz', task: 'Zona 2: Apoyo acomodación.'},
                {id: 7, t: 26, l: 69, type: 'vol', name: 'Maritriny Barrera', task: 'Zona 3: Reservas Comité.'},
                {id: 16, t: 21, l: 51.5, type: 'sup', name: 'Juan Castrillón', task: 'Supervisor Izquierdo.'},
                {id: 26, t: 30, l: 17.5, type: 'vol', name: 'Arnulfo Canchila', task: 'Zona 6: Rampa Betel.'},
                // ... Agrega aquí los 28 puntos siguiendo el patrón de tu imagen
            ]
        };

        // Generamos los puntos faltantes automáticamente para el ejemplo (luego puedes editarlos)
        for(let i=1; i<=28; i++) {
            if(!config.positions.find(p => p.id === i)) {
                config.positions.push({id: i, t: Math.random()*80+10, l: Math.random()*80+10, type: 'vol', name: 'Pendiente', task: 'Asignación de zona.'});
            }
        }

        function loadView(viewKey) {
            const view = config.views[viewKey] || config.views.general;
            document.getElementById('main-map').src = view.img;
            document.getElementById('current-title').innerText = view.title;
            
            // UI Update
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            event?.currentTarget?.classList?.add('active');
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');

            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';

            config.positions.forEach(p => {
                // Lógica de filtrado: si es 'all' o el ID está en la lista de la zona
                if (view.show === 'all' || view.show.includes(p.id)) {
                    const el = document.createElement('div');
                    el.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    el.style.top = p.t + '%';
                    el.style.left = p.l + '%';
                    el.innerText = p.id;
                    el.onclick = () => showInfo(p);
                    layer.appendChild(el);
                }
            });
        }

        function showInfo(p) {
            document.getElementById('m-pos').innerText = `PUESTO ${p.id}`;
            document.getElementById('m-name').innerText = `Responsable: ${p.name}`;
            document.getElementById('m-desc').innerText = p.task;
            document.getElementById('modal').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = () => loadView('general');
    </script>
</body>
</html>
