<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Auditorio - Full View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- MODAL CON SCROLL INTELIGENTE --- */
        #modal { 
            display: none; 
            position: fixed; 
            background: #fff; 
            color: #111; 
            z-index: 6000; 
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 769px) {
            #modal { 
                width: 450px; 
                max-height: 85vh; 
                top: 50%; 
                left: 50%; 
                transform: translate(-50%, -50%) scale(0.9); 
                border-radius: 15px; 
            }
            #modal.open { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            #modal { 
                width: 100%; 
                max-height: 80vh; 
                bottom: 0; 
                left: 0; 
                right: 0; 
                border-radius: 25px 25px 0 0; 
                transform: translateY(100%); 
            }
            #modal.open { transform: translateY(0); }
        }

        .modal-body { 
            padding: 25px; 
            overflow-y: auto; 
            flex: 1; 
            -webkit-overflow-scrolling: touch; 
        }

        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-track { background: #f1f1f1; }
        .modal-body::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .close-btn { 
            background: #000; 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 20px; 
            font-weight: bold; 
            cursor: pointer;
            flex-shrink: 0; 
        }

        :root { 
            --primary: #ff5500; 
            --sup: #d00000; 
            --bg: #0a0a0a; 
            --sidebar-bg: #111;
            --card: #1a1a1a; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { 
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid #333; 
            display: flex; flex-direction: column; z-index: 5000; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); left: 0; top: 0; }
            .sidebar.open { transform: translateX(0); box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        }

        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 0.9rem; color: var(--primary); letter-spacing: 2px; margin: 0; font-weight: 800; }
        
        .close-sidebar { background: #222; border: none; color: white; width: 35px; height: 35px; border-radius: 50%; display: none; cursor: pointer; }
        @media (max-width: 768px) { .close-sidebar { display: flex; align-items: center; justify-content: center; } }

        .menu-item { padding: 16px 25px; cursor: pointer; color: #bbb; display: flex; align-items: center; gap: 15px; border-left: 4px solid transparent; transition: 0.2s; }
        .menu-item.active { background: #222; color: #fff; border-left-color: var(--primary); font-weight: bold; }

        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; z-index: 10; }
        .top-bar { padding: 0 20px; height: 60px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .menu-toggle { background: #222; color: white; border: 1px solid #444; width: 45px; height: 45px; border-radius: 10px; cursor: pointer; display: none; align-items: center; justify-content: center; }
        @media (max-width: 768px) { .menu-toggle { display: flex; } }

        .map-viewport { flex: 1; background: #000; position: relative; overflow: auto; }
        .no-scroll { overflow: hidden !important; display: flex; align-items: center; justify-content: center; }

        .map-container { position: relative; display: inline-block; transition: all 0.3s ease; }
        .view-general .map-container { min-width: 1100px; padding: 40px; }
        .view-general .map-img { width: 100%; height: auto; }
        .view-zone .map-container { width: 100%; height: 100%; padding: 10px; display: flex; align-items: center; justify-content: center; }
        .view-zone .map-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .pin {
            position: absolute; width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 15px; font-weight: 900; color: white; border: 2px solid #fff; 
            transform: translate(-50%, -50%); cursor: pointer; z-index: 100;
        }
        .pin-sup { background: var(--sup); border-radius: 10px; }
        .pin-vol { background: var(--primary); }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 4000; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeAll()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>LOGÍSTICA</h2>
            <button class="close-sidebar" onclick="closeAll()"><i class="fas fa-times"></i></button>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="changeView('general')"><i class="fas fa-th-large"></i> MAPA GENERAL</div>
            <div class="menu-item" onclick="changeView('1')"><i class="fas fa-map-marker-alt"></i> ZONA 1</div>
            <div class="menu-item" onclick="changeView('2')"><i class="fas fa-map-marker-alt"></i> ZONA 2</div>
            <div class="menu-item" onclick="changeView('3')"><i class="fas fa-map-marker-alt"></i> ZONA 3</div>
            <div class="menu-item" onclick="changeView('4')"><i class="fas fa-map-marker-alt"></i> ZONA 4</div>
            <div class="menu-item" onclick="changeView('5')"><i class="fas fa-map-marker-alt"></i> ZONA 5</div>
            <div class="menu-item" onclick="changeView('6')"><i class="fas fa-map-marker-alt"></i> ZONA 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
            <h1 id="view-title" style="font-size: 1rem;">MAPA GENERAL</h1>
            <div style="width:40px"></div>
        </header>

        <div class="map-viewport view-general" id="map-viewport">
            <div class="map-container" id="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="modal">
        <div class="modal-body">
            <div style="width:40px; height:4px; background:#ddd; margin:-10px auto 15px; border-radius:10px;"></div>
            <div id="modal-content"></div>
        </div>
        <button class="close-btn" onclick="closeAll()">CERRAR</button>
    </div>

    <script>
        const mapFiles = { general: "mapas.png", "1": "zona1.png", "2": "zona2.png", "3": "zona3.png", "4": "zona4.png", "5": "zona5.png", "6": "zona6.png" };

            task: 'RADIO. Responsable de confirmar voluntarios y asignar posiciones. Realiza check-in (implementos y presentación). Responsable de contadores. Supervisa fluidez en rampas, centros y caracol del lobby. Gestiona ingreso por puerta pequeña si hay pocos asistentes y flujo de filas Betel. Asegura chaquetas para voluntarios e ingreso de población prioritaria al lobby. Supervisa relevos para Casa Fuente y reporta situaciones al Coordinador. Supervisa salida de nuevos sin quitar parales hasta el final. Responsable de puestos 16 al 30.'

        {

            task: 'ZONA 5 Abajo. RADIO. Responsable de zona. Dirige asistentes por rampa sobre zona 6. Reserva sillas para líderes y prioritarios (sillas de ruedas en 1ra fila, acompañantes en 2da). Forros: uno en rampa izquierda y otro en prioridad. Capas bajo primera silla de fila en rampa izquierda. Dirige salida de nuevos (carita feliz). En salida sostiene lazo arriba dirigiendo de arriba hacia abajo (prioritarios primero).'

        }
        ];

        let activeView = 'general';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAll() {
            document.getElementById('sidebar').classList.remove('open');
            const m = document.getElementById('modal');
            m.classList.remove('open');
            setTimeout(() => {
                if(!m.classList.contains('open')) {
                    document.getElementById('overlay').style.display = 'none';
                    m.style.display = 'none';
                }
            }, 300);
        }

        function changeView(view) {
            activeView = view;
            const viewport = document.getElementById('map-viewport');
            const map = document.getElementById('main-map');
            
            if(view === 'general') {
                viewport.className = 'map-viewport view-general';
            } else {
                viewport.className = 'map-viewport view-zone no-scroll';
            }

            map.style.opacity = '0';
            setTimeout(() => {
                map.src = mapFiles[view];
                document.getElementById('view-title').innerText = view === 'general' ? 'MAPA GENERAL' : `ZONA ${view}`;
                map.onload = () => { map.style.opacity = '1'; renderPins(); };
            }, 200);

            closeAll();
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(view === 'general' ? 'GENERAL' : `ZONA ${view}`)) item.classList.add('active');
            });
        }

        function renderPins() {
            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';
            positions.forEach(p => {
                const isGeneral = activeView === 'general';
                const isMatch = p.zone.includes(`ZONA ${activeView}`);
                const isSup = p.type === 'sup' && (
                    (activeView >= 1 && activeView <= 4 && p.zone.includes('1, 2, 3, 4')) ||
                    (activeView >= 5 && activeView <= 6 && p.zone.includes('5, 6'))
                );

                if (isGeneral || isMatch || isSup) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    
                    let pos;
                    if (isGeneral) {
                        pos = p.g;
                    } else {
                        const isMobile = window.innerWidth <= 768;
                        pos = (isMobile && p.m) ? p.m : p.z;
                    }
                    
                    div.style.top = pos.t + '%';
                    div.style.left = pos.l + '%';
                    div.innerHTML = p.id;
                    div.onclick = (e) => { e.stopPropagation(); showInfo(p); };
                    layer.appendChild(div);
                }
            });
        }

        function showInfo(p) {
            document.getElementById('modal-content').innerHTML = `
                <h2 style="margin:0; color:var(--primary); font-size:1.3rem;">${p.label}</h2>
                <small style="color:#666; font-weight:800; display:block; margin-bottom:15px;">${p.zone}</small>
                <p style="line-height:1.6; color:#333; margin:0;">${p.task}</p>
            `;
            document.getElementById('overlay').style.display = 'block';
            const m = document.getElementById('modal');
            m.style.display = 'block';
            setTimeout(() => m.classList.add('open'), 10);
        }

        window.onload = () => changeView('general');
        window.onresize = () => renderPins();
    </script>
</body>
</html>
