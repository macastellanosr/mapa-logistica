<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Auditorio - Pro Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff5500; 
            --sup: #d00000; 
            --bg: #0a0a0a; 
            --sidebar-bg: #000; 
            --card: #1a1a1a; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Botón Flotante Menú */
        .menu-toggle {
            position: fixed; bottom: 20px; right: 20px; 
            background: var(--primary); color: white; width: 60px; height: 60px; 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.8); border: none; font-size: 1.5rem;
            cursor: pointer;
        }

        /* Sidebar - CORREGIDO PARA MOBILE */
        .sidebar { 
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid #222; 
            display: flex; flex-direction: column; z-index: 4000; 
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        }

        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { font-size: 0.8rem; color: var(--primary); letter-spacing: 2px; margin: 0; }
        .close-sidebar { display: none; background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        @media (max-width: 768px) { .close-sidebar { display: block; } }

        .menu-item { padding: 15px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 15px; border-left: 4px solid transparent; transition: 0.2s; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: bold; }

        /* Contenido Principal */
        .main { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        .top-bar { padding: 0 20px; height: 60px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        
        /* Area del Mapa - CORREGIDO PARA POSICIONES */
        .map-viewport { flex: 1; overflow: auto; background: #000; display: block; position: relative; }
        
        /* El contenedor debe tener un ancho mínimo para que los % de los pines no se muevan */
        .map-container { 
            position: relative; 
            display: inline-block; 
            min-width: 1200px; /* Asegura que en mobile no se "aplaste" el mapa */
            padding: 40px; 
        }
        
        .map-img { display: block; width: 100%; height: auto; transition: opacity 0.3s; }

        .pin {
            position: absolute; width: 44px; height: 44px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: 900; color: white; border: 2.5px solid #fff; 
            transform: translate(-50%, -50%); cursor: pointer; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .pin-sup { background: var(--sup); border-radius: 12px; }
        .pin-vol { background: var(--primary); }

        /* Modal Mobile - CORREGIDO */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 5000; }
        #modal { 
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; color: #111; border-radius: 20px 20px 0 0; z-index: 5100; 
            transform: translateY(100%); transition: transform 0.3s ease;
        }
        #modal.open { transform: translateY(0); }
        .modal-body { padding: 25px; max-height: 70vh; overflow-y: auto; }
        .close-btn { background: #000; color: white; border: none; width: 100%; padding: 20px; font-weight: bold; border-radius: 0; cursor: pointer; }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>PANEL LOGÍSTICO</h2>
            <button class="close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="changeView('general')"><i class="fas fa-map"></i> MAPA GENERAL</div>
            <div class="menu-item" onclick="changeView('1')"><i class="fas fa-th-large"></i> ZONA 1</div>
            <div class="menu-item" onclick="changeView('2')"><i class="fas fa-th-large"></i> ZONA 2</div>
            <div class="menu-item" onclick="changeView('3')"><i class="fas fa-th-large"></i> ZONA 3</div>
            <div class="menu-item" onclick="changeView('4')"><i class="fas fa-th-large"></i> ZONA 4</div>
            <div class="menu-item" onclick="changeView('5')"><i class="fas fa-th-large"></i> ZONA 5</div>
            <div class="menu-item" onclick="changeView('6')"><i class="fas fa-th-large"></i> ZONA 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <h1 id="view-title" style="font-size: 1rem;">MAPA GENERAL</h1>
            <div id="status-tag" style="font-size: 0.6rem; background: #333; padding: 4px 8px; border-radius: 4px;">ONLINE</div>
        </header>

        <div class="map-viewport">
            <div class="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeAll()"></div>
    <div id="modal">
        <div style="width: 40px; height: 5px; background: #ddd; margin: 15px auto; border-radius: 10px;"></div>
        <div class="modal-body" id="modal-content"></div>
        <button class="close-btn" onclick="closeAll()">CERRAR</button>
    </div>

    <script>
        const mapFiles = { general: "mapas.png", "1": "zona1.png", "2": "zona2.png", "3": "zona3.png", "4": "zona4.png", "5": "zona5.png", "6": "zona6.png" };

        // DATA COMPLETA 28 PUESTOS
        const positions = [
            {id: 1, type: 'sup', zone: 'ZONAS 1,2,3,4', label: 'SUPERVISOR DERECHO', radio: 'RADIO', g: {t:22, l:72}, z: {t:10, l:50}, task: 'Organiza voluntarios zona derecha. Responsable de check-in, uniforme, conocimiento de lazos e ingresos/salidas.'},
            {id: 2, type: 'vol', zone: 'ZONA 1', label: 'ZONA 1 - PUESTO #2', radio: 'RADIO', g: {t:8, l:78}, z: {t:25, l:40}, task: 'Responsable de zona. Ubican personas abajo-arriba. Fines de semana reservada para papas SPK.'},
            {id: 3, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #3', radio: '-', g: {t:25, l:74}, z: {t:35, l:45}, task: 'Fila 5 de paso. Dirige a zona 1. Reserva sillas alabanza/líderes.'},
            {id: 4, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #4', radio: '-', g: {t:38, l:76}, z: {t:55, l:50}, task: 'Apoya acomodación. Coloca carita feliz a nuevos.'},
            {id: 5, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #5', radio: 'RADIO', g: {t:15, l:85}, z: {t:20, l:80}, task: 'Responsable zona arriba. Ubicación abajo-arriba. Reserva Traducción.'},
            {id: 6, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #6', radio: '-', g: {t:10, l:90}, z: {t:15, l:85}, task: 'Apoya ingreso a sillas. En salida sostiene lazo.'},
            {id: 7, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #7', radio: 'RADIO', g: {t:26, l:68}, z: {t:35, l:45}, task: 'Acomodación abajo-arriba. Reservas Comité/Staff/Líderes.'},
            {id: 8, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #8', radio: '-', g: {t:34, l:70}, z: {t:45, l:50}, task: 'Apoya logística. Sostiene bandera al llamado de nuevos.'},
            {id: 9, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #9', radio: '-', g: {t:50, l:74}, z: {t:80, l:70}, task: 'Semáforo Escalera Derecha. Coordina salida a baños.'},
            {id: 10, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #10', radio: 'RADIO', g: {t:36, l:52}, z: {t:45, l:35}, task: 'Lado Izquierdo. Reservas de Supervisor. Primeras filas líderes.'},
            {id: 11, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #11', radio: '-', g: {t:52, l:50}, z: {t:80, l:35}, task: 'Semáforo Escalera Izquierda. Coordina salida a baños.'},
            {id: 12, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #12', radio: 'RADIO', g: {t:58, l:70}, z: {t:65, l:70}, task: 'Lado Derecho. Ubicación abajo-arriba. 2 forros negros.'},
            {id: 13, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #13', radio: '-', g: {t:65, l:72}, z: {t:78, l:75}, task: 'Apoya logística. Guía nuevos y coloca carita feliz.'},
            {id: 14, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #14', radio: 'RADIO', g: {t:58, l:48}, z: {t:65, l:30}, task: 'Lado Izquierdo. 2 forros negros. Salida alterna derecha/izquierda.'},
            {id: 15, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #15', radio: '-', g: {t:65, l:45}, z: {t:78, l:25}, task: 'Apoya logística y salida de nuevos. Sostiene lazo arriba.'},
            {id: 16, type: 'sup', zone: 'ZONAS 5,6', label: 'SUPERVISOR IZQUIERDO', radio: 'RADIO', g: {t:21, l:51}, z: {t:10, l:50}, task: 'Supervisa rampas, centros e ingresos prioritarios.'},
            {id: 17, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #17', radio: 'RADIO', g: {t:28, l:45}, z: {t:40, l:30}, task: 'Responsable prioritarios y sillas de ruedas.'},
            {id: 18, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #18', radio: '-', g: {t:35, l:43}, z: {t:50, l:35}, task: 'Apoya reserva líderes. Sostiene lazo abajo en salida.'},
            {id: 19, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #19', radio: 'RADIO', g: {t:48, l:40}, z: {t:65, l:40}, task: 'Ingreso abajo-arriba sobre rampa. 3 forros negros.'},
            {id: 20, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #20', radio: '-', g: {t:55, l:38}, z: {t:75, l:45}, task: 'Apoya ingreso y ubicación. Sostiene lazo en salida.'},
            {id: 21, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #21', radio: 'RADIO', g: {t:15, l:35}, z: {t:25, l:20}, task: 'Arriba. Dirige asistentes hacia arriba.'},
            {id: 22, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #22', radio: '-', g: {t:8, l:32}, z: {t:15, l:20}, task: 'Ubicado arriba. Dirige asistentes para ser ubicados.'},
            {id: 23, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #23', radio: '-', g: {t:5, l:28}, z: {t:5, l:15}, task: 'Parte última de zona. Dirige acomodación.'},
            {id: 24, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #24', radio: '-', g: {t:12, l:40}, z: {t:20, l:50}, task: 'Ubica iglesia abajo-arriba. Forros negros fila 1.'},
            {id: 25, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #25', radio: 'RADIO', g: {t:18, l:30}, z: {t:30, l:35}, task: 'Apoya logística. Salida rampa Betel.'},
            {id: 26, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #26', radio: 'RADIO', g: {t:30, l:18}, z: {t:45, l:20}, task: 'Arriba. Dirige asistentes hacia arriba.'},
            {id: 27, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #27', radio: '-', g: {t:22, l:12}, z: {t:35, l:15}, task: 'Arriba. Dirige acomodación.'},
            {id: 28, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #28', radio: '-', g: {t:10, l:10}, z: {t:15, l:10}, task: 'Arriba. Dirige por fila de paso hacia rincón.'}
        ];

        let activeView = 'general';

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.getElementById('overlay').style.display = sb.classList.contains('open') ? 'block' : 'none';
        }

        function changeView(view) {
            activeView = view;
            const map = document.getElementById('main-map');
            map.style.opacity = '0.2';
            
            setTimeout(() => {
                map.src = mapFiles[view];
                document.getElementById('view-title').innerText = view === 'general' ? 'MAPA GENERAL' : `ZONA ${view}`;
                map.onload = () => {
                    map.style.opacity = '1';
                    renderPins();
                };
            }, 200);

            if(window.innerWidth <= 768) toggleSidebar();
            
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(view === 'general' ? 'GENERAL' : `ZONA ${view}`)) item.classList.add('active');
            });
        }

        function renderPins() {
            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';
            positions.forEach(p => {
                const isGeneral = activeView === 'general';
                const isZone = p.zone.includes(`ZONA ${activeView}`);
                const isSup = p.type === 'sup' && (
                    (activeView >= 1 && activeView <= 4 && p.zone.includes('1,2,3,4')) ||
                    (activeView >= 5 && activeView <= 6 && p.zone.includes('5,6'))
                );

                if (isGeneral || isZone || isSup) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    const pos = isGeneral ? p.g : p.z;
                    div.style.top = pos.t + '%';
                    div.style.left = pos.l + '%';
                    div.innerHTML = p.id;
                    div.onclick = (e) => { e.stopPropagation(); showInfo(p); };
                    layer.appendChild(div);
                }
            });
        }

        function showInfo(p) {
            document.getElementById('modal-content').innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div>
                        <h2 style="margin:0; font-size:1.2rem; color:var(--primary)">${p.label}</h2>
                        <small style="color:#666">${p.zone}</small>
                    </div>
                    <span style="background:#000; color:#fff; padding:5px 10px; border-radius:15px; font-size:0.7rem;">${p.radio === 'RADIO' ? '📻 RADIO' : 'SIN RADIO'}</span>
                </div>
                <p style="margin-top:20px; line-height:1.6; color:#333;">${p.task}</p>
            `;
            document.getElementById('overlay').style.display = 'block';
            const m = document.getElementById('modal');
            m.style.display = 'block';
            setTimeout(() => m.classList.add('open'), 10);
        }

        function closeAll() {
            const m = document.getElementById('modal');
            m.classList.remove('open');
            document.getElementById('sidebar').classList.remove('open');
            setTimeout(() => {
                m.style.display = 'none';
                document.getElementById('overlay').style.display = 'none';
            }, 300);
        }

        window.onload = () => changeView('general');
    </script>
</body>
</html>
