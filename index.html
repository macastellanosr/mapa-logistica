<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Logística Interactivo</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; justify-content: center; background: #f0f2f5; }
        .map-container { position: relative; max-width: 1000px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .map-image { width: 100%; display: block; border-radius: 8px; }
        
        /* Los puntos interactivos */
        .dot {
            position: absolute;
            width: 25px;
            height: 25px;
            background: rgba(255, 69, 0, 0.4); /* Color naranja semi-transparente */
            border: 2px solid orangered;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .dot:hover { transform: scale(1.3); background: rgba(255, 69, 0, 0.8); }

        /* El Pop-up (Modal) */
        #modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            width: 300px;
            text-align: center;
        }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }
        .close-btn { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

<div class="map-container">
    <img src="tu-mapa.png" class="map-image" id="mapa">

    <div class="dot" style="top: 15%; left: 75%;" onclick="showInfo(1)"></div> <div class="dot" style="top: 15%; left: 45%;" onclick="showInfo(13)"></div> <div class="dot" style="top: 8%; left: 18%;" onclick="showInfo(26)"></div> </div>

<div id="overlay" onclick="closeModal()"></div>
<div id="modal">
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
    <button class="close-btn" onclick="closeModal()">Cerrar</button>
</div>

<script>
    // AQUÍ ES DONDE CAMBIAS LA INFORMACIÓN FÁCILMENTE
    const data = {
        1: { title: "ID 1: Zona Derecha", desc: "Responsable: Luis R. <br> Tarea: Supervisar fila 1 y entrada principal." },
        13: { title: "ID 13: Tarima Central", desc: "Responsable: Coordinador General. <br> Tarea: Gestión de audio y tiempos de tarima." },
        26: { title: "ID 26: Salida Eléctrica", desc: "Responsable: Seguridad. <br> Tarea: Control de flujo en escaleras eléctricas." }
    };

    function showInfo(id) {
        document.getElementById('modal-title').innerText = data[id].title;
        document.getElementById('modal-desc').innerHTML = data[id].desc;
        document.getElementById('modal').style.display = 'block';
        document.getElementById('overlay').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>
