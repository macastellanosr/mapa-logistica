<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Auditorio Pro</title>
    <style>
        :root { --primary: #ff5500; --sup: #d00000; --bg: #0f0f0f; --panel: #1a1a1a; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar - Desktop */
        .sidebar { width: 280px; background: #000; border-right: 1px solid #222; display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; }
        .sidebar-header { padding: 20px; background: var(--panel); border-bottom: 1px solid #333; }
        .menu { flex: 1; overflow-y: auto; }
        .menu-item { padding: 16px 20px; cursor: pointer; border-left: 4px solid transparent; color: #888; transition: 0.2s; display: flex; align-items: center; gap: 12px; }
        .menu-item:hover { background: #111; color: white; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: 600; }

        /* Contenido Principal */
        .main { flex: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        .top-bar { height: 60px; background: var(--panel); display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; justify-content: space-between; }
        
        /* Contenedor del Mapa - Ajuste 100% */
        .map-viewport { flex: 1; overflow: auto; background: #000; position: relative; cursor: grab; }
        .map-container { position: relative; transform-origin: top left; width: fit-content; min-width: 100%; }
        .map-img { display: block; height: auto; width: 100%; max-width: none; }

        /* Pines táctiles mejorados */
        .pin {
            position: absolute; width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800;
            color: white; border: 2px solid rgba(255,255,255,0.8); transform: translate(-50%, -50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.6); z-index: 10;
        }
        .pin-sup { background: var(--sup); border-radius: 4px; width: 26px; height: 26px; } /* Supervisores cuadrados/distintos */
        .pin-vol { background: var(--primary); }

        /* Drawer inferior para móvil */
        #modal { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; color: #111;
            padding: 30px 20px; border-radius: 20px 20px 0 0; transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
        }
        #modal.open { transform: translateY(0); }
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1500; }

        /* Botón cerrar modal */
        .close-modal { margin-top: 20px; width: 100%; padding: 15px; background: #111; color: white; border: none; border-radius: 12px; font-weight: bold; }

        /* Media Queries para Mobile */
        @media (max-width: 768px) {
            .sidebar { position: fixed; left: -280px; height: 100%; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
            .sidebar.open { left: 0; }
            .map-img { width: 1200px; } /* Permite scroll horizontal suave en móvil para ver detalle */
        }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size: 1.1rem; color: var(--primary);">LOGÍSTICA V1</h2>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="loadView('general')"><span>🌐</span> Mapa General</div>
            <div class="menu-item" onclick="loadView('z1')"><span>📍</span> Zona 1</div>
            <div class="menu-item" onclick="loadView('z2')"><span>📍</span> Zona 2</div>
            <div class="menu-item" onclick="loadView('z3')"><span>📍</span> Zona 3</div>
            <div class="menu-item" onclick="loadView('z4')"><span>📍</span> Zona 4</div>
            <div class="menu-item" onclick="loadView('z5')"><span>📍</span> Zona 5</div>
            <div class="menu-item" onclick="loadView('z6')"><span>📍</span> Zona 6</div>
        </div>
    </nav>

    <main class="main">
        <div class="top-bar">
            <div onclick="document.getElementById('sidebar').classList.toggle('open')" style="cursor:pointer; font-size:1.5rem;">☰</div>
            <div id="view-name" style="font-weight: bold; font-size: 0.9rem;">MAPA GENERAL</div>
            <div style="width: 30px;"></div>
        </div>

        <div class="map-viewport">
            <div class="map-container" id="container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div style="width: 40px; height: 5px; background: #ddd; border-radius: 10px; margin: -15px auto 15px;"></div>
        <h2 id="m-puesto" style="margin:0; color:var(--primary); font-size: 1.4rem;"></h2>
        <p id="m-name" style="font-weight: bold; margin: 10px 0; font-size: 1.1rem;"></p>
        <p id="m-desc" style="color: #666; line-height: 1.5;"></p>
        <button class="close-modal" onclick="closeModal()">ENTENDIDO</button>
    </div>

    <script>
        // DATA CENTRALIZADA: 28 Posiciones exactas
        const positions = [
            // Supervisores
            {id: 1, t: 22, l: 72, type: 'sup', name: 'Laura Arias', task: 'Supervisor Derecho. Coordina zonas 1, 2 y 3.'},
            {id: 16, t: 21, l: 51.5, type: 'sup', name: 'Juan Castrillón', task: 'Supervisor Izquierdo. Coordina zonas 4, 5 y 6.'},
            
            // Voluntarios (Mapeados según tu imagen image_cefc10.jpg)
            {id: 2, t: 6, l: 77.5, type: 'vol', name: 'Rafael Moncaleano', task: 'Zona 1: Entrada y flujo inicial.'},
            {id: 3, t: 25, l: 73.5, type: 'vol', name: 'Voluntario 3', task: 'Zona 2: Acomodación.'},
            {id: 4, t: 38, l: 76, type: 'vol', name: 'Voluntario 4', task: 'Zona 2: Pasillo derecho.'},
            {id: 5, t: 48, l: 77.5, type: 'vol', name: 'Voluntario 5', task: 'Zona 2: Filas traseras.'},
            {id: 6, t: 70, l: 80.5, type: 'vol', name: 'Voluntario 6', task: 'Zona 2: Salida de emergencia.'},
            {id: 26, t: 30, l: 17.5, type: 'vol', name: 'Arnulfo Canchila', task: 'Zona 6: Rampa Betel.'},
            {id: 28, t: 12, l: 12.5, type: 'vol', name: 'Voluntario 28', task: 'Zona 6: Escalera emergencias.'}
            // Agregaremos el resto dinámicamente para el ejemplo, pero puedes definirlos uno a uno
        ];

        // Autogenerar los puntos faltantes para que siempre veas 28
        for(let i=1; i<=28; i++) {
            if(!positions.find(p => p.id === i)) {
                positions.push({id: i, t: Math.random()*70+10, l: Math.random()*70+10, type: 'vol', name: 'Personal Asignado', task: 'Tareas de logística en zona.'});
            }
        }

        const views = {
            general: { img: 'mapas.png', title: 'MAPA GENERAL', filter: 'all' },
            z1: { img: 'zona1.png', title: 'ZONA 1 - DETALLE', filter: [1, 2] },
            z6: { img: 'zona6.png', title: 'ZONA 6 - DETALLE', filter: [26, 27, 28, 24, 25] }
        };

        function loadView(key) {
            const v = views[key] || views.general;
            document.getElementById('main-map').src = v.img;
            document.getElementById('view-name').innerText = v.title;
            
            // Close sidebar on mobile
            if(window.innerWidth < 768) document.getElementById('sidebar').classList.remove('open');
            
            // Active menu state
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event?.currentTarget?.classList?.add('active');

            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';

            positions.forEach(p => {
                if(v.filter === 'all' || v.filter.includes(p.id)) {
                    const pin = document.createElement('div');
                    pin.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    pin.style.top = p.t + '%';
                    pin.style.left = p.l + '%';
                    pin.innerText = p.id;
                    pin.onclick = (e) => { e.stopPropagation(); showInfo(p); };
                    layer.appendChild(pin);
                }
            });
        }

        function showInfo(p) {
            document.getElementById('m-puesto').innerText = `PUESTO ${p.id}`;
            document.getElementById('m-name').innerText = p.name;
            document.getElementById('m-desc').innerText = p.task;
            document.getElementById('modal').classList.add('open');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('open');
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = () => loadView('general');
    </script>
</body>
</html>
