<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logística Auditorio - Sistema de Posiciones</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff5500; 
            --sup: #d00000; 
            --bg: #0a0a0a; 
            --sidebar: #000; 
            --card: #1a1a1a; 
            --text-dim: #888;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Botón Menú Móvil */
        .menu-toggle {
            display: none; position: fixed; bottom: 25px; right: 25px; 
            background: var(--primary); color: white; width: 60px; height: 60px; 
            border-radius: 50%; justify-content: center; align-items: center; 
            z-index: 3000; box-shadow: 0 4px 20px rgba(0,0,0,0.6); border: none; font-size: 1.5rem;
        }

        /* Sidebar */
        .sidebar { 
            width: 260px; background: var(--sidebar); border-right: 1px solid #222; 
            display: flex; flex-direction: column; z-index: 1500; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .sidebar-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid #222; }
        .sidebar-header h2 { font-size: 0.85rem; color: var(--primary); letter-spacing: 2px; margin: 0; text-transform: uppercase; }

        .menu { flex: 1; padding: 15px 0; overflow-y: auto; }
        .menu-item { 
            padding: 15px 25px; cursor: pointer; color: var(--text-dim); display: flex; 
            align-items: center; gap: 15px; border-left: 4px solid transparent; transition: 0.2s; font-size: 0.9rem;
        }
        .menu-item:hover { color: white; background: #111; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: bold; }

        /* Main Content */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; min-width: 0; }
        .top-bar { 
            padding: 0 25px; height: 70px; background: var(--card); border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center; z-index: 10;
        }
        .top-bar h1 { font-size: 1.1rem; font-weight: 400; margin: 0; letter-spacing: 1px; }

        /* Map Area */
        .map-viewport { 
            flex: 1; overflow: auto; display: flex; justify-content: center; 
            align-items: center; background: #000; position: relative; cursor: grab;
        }
        .map-viewport:active { cursor: grabbing; }
        
        .map-container { position: relative; display: inline-block; padding: 50px; }
        .map-img { display: block; height: 85vh; width: auto; transition: opacity 0.3s; }

        /* Pins */
        .pin {
            position: absolute; width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 16px; font-weight: 900; color: white; border: 2.5px solid #fff; 
            transform: translate(-50%, -50%); cursor: pointer; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pin::after {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            animation: pulse 2s infinite; z-index: -1;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.7; } 100% { transform: scale(1.8); opacity: 0; } }

        .pin-sup { background: var(--sup); border-radius: 12px; }
        .pin-vol { background: var(--primary); }
        .pin:hover { transform: translate(-50%, -50%) scale(1.2); z-index: 200; }

        /* Overlay y Modales */
        #overlay { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px); z-index: 2500; 
        }
        
        #modal { 
            display: none; position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; color: #111; border-radius: 25px 25px 0 0; z-index: 2600; 
            transform: translateY(100%); transition: transform 0.3s ease-out;
        }
        #modal.open { transform: translateY(0); }
        
        .modal-body { padding: 30px; max-height: 75vh; overflow-y: auto; }
        .close-btn { 
            background: #000; color: white; border: none; width: 100%; 
            padding: 20px; font-weight: bold; font-size: 1rem; text-transform: uppercase; cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: flex; }
            .map-container { min-width: 900px; } /* Permite scroll horizontal en móvil */
            .top-bar h1 { font-size: 0.9rem; }
            #modal { border-radius: 20px 20px 0 0; }
        }
    </style>
</head>
<body>

    <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><h2>PANEL LOGÍSTICO</h2></div>
        <div class="menu">
            <div class="menu-item active" onclick="changeView('general')"><i class="fas fa-map"></i> MAPA GENERAL</div>
            <div class="menu-item" onclick="changeView('1')"><i class="fas fa-th-large"></i> ZONA 1</div>
            <div class="menu-item" onclick="changeView('2')"><i class="fas fa-th-large"></i> ZONA 2</div>
            <div class="menu-item" onclick="changeView('3')"><i class="fas fa-th-large"></i> ZONA 3</div>
            <div class="menu-item" onclick="changeView('4')"><i class="fas fa-th-large"></i> ZONA 4</div>
            <div class="menu-item" onclick="changeView('5')"><i class="fas fa-th-large"></i> ZONA 5</div>
            <div class="menu-item" onclick="changeView('6')"><i class="fas fa-th-large"></i> ZONA 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <h1 id="view-title">MAPA GENERAL</h1>
            <div style="font-size: 0.7rem; color: var(--text-dim);"><i class="fas fa-circle" style="color:#4CAF50"></i> EN LÍNEA</div>
        </header>

        <div class="map-viewport" id="viewport">
            <div class="map-container" id="container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div style="width: 50px; height: 5px; background: #ddd; margin: 12px auto; border-radius: 10px;"></div>
        <div class="modal-body" id="modal-content">
            </div>
        <button class="close-btn" onclick="closeModal()">Entendido</button>
    </div>

    <script>
        const mapFiles = {
            general: "mapas.png",
            "1": "zona1.png", "2": "zona2.png", "3": "zona3.png", 
            "4": "zona4.png", "5": "zona5.png", "6": "zona6.png"
        };

        const positions = [
            // ZONA 1-4 DERECHA
            {id: 1, type: 'sup', zone: 'ZONAS 1,2,3,4', label: 'SUPERVISOR DERECHO', radio: 'RADIO', g: {t:22, l:72}, z: {t:10, l:50}, task: 'Organiza voluntarios zona derecha. Responsable de check-in, uniforme, conocimiento de lazos, número de sillas e ingresos/salidas. En lo espiritual discierne y pide oración.'},
            {id: 2, type: 'vol', zone: 'ZONA 1', label: 'ZONA 1 - PUESTO #2', radio: 'RADIO', g: {t:8, l:78}, z: {t:25, l:40}, task: 'Responsable de zona. Ubican personas abajo-arriba. Fines de semana reservada para papas SPK. Sostiene cuerda abajo. Coloca carita feliz a nuevos. Forro negro en fila 1 y mitad.'},
            {id: 3, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #3', radio: '-', g: {t:25, l:74}, z: {t:35, l:45}, task: 'Fila 5 de paso. Dirige a zona 1. Reserva sillas alabanza/líderes. Coloca capas lluvia rampa Zona 1. Forros negros: uno en fila 1, otro en última fila prioritaria.'},
            {id: 4, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #4', radio: '-', g: {t:38, l:76}, z: {t:55, l:50}, task: 'Apoya acomodación. Coloca carita feliz a nuevos. En salida saca las últimas 4 filas por la última fila de zona 2. Demás por escalera interna.'},
            {id: 5, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #5', radio: 'RADIO', g: {t:15, l:85}, z: {t:20, l:80}, task: 'Responsable zona arriba. Ubicación abajo-arriba. Reserva Traducción. Fin de semana papás SPKS. 3 forros negros estratégicos. Lazo abajo en salida.'},
            {id: 6, type: 'vol', zone: 'ZONA 2', label: 'ZONA 2 - PUESTO #6', radio: '-', g: {t:10, l:90}, z: {t:15, l:85}, task: 'Apoya ingreso a sillas. En salida sostiene lazo. Dirige salida de nuevos y coloca carita feliz.'},
            {id: 7, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #7', radio: 'RADIO', g: {t:26, l:68}, z: {t:35, l:45}, task: 'Acomodación abajo-arriba. Reservas Comité/Staff/Líderes. 3 forros negros (Pastores, servidor X y baranda). Salida alterna: una fila derecha, otra izquierda.'},
            {id: 8, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #8', radio: '-', g: {t:34, l:70}, z: {t:45, l:50}, task: 'Apoya logística. Sostiene bandera al llamado de nuevos y los dirige a Orientación Centro. Lazo abajo en salida.'},
            {id: 9, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #9', radio: '-', g: {t:50, l:74}, z: {t:80, l:70}, task: 'Semáforo Escalera Derecha. Coordina salida a baños para evitar doble vía. En salida hace la "L" con el lazo para ampliar flujo.'},
            {id: 10, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #10', radio: 'RADIO', g: {t:36, l:52}, z: {t:45, l:35}, task: 'Lado Izquierdo. Reservas de Supervisor. Primeras filas líderes. Salida alterna derecha/izquierda de arriba-abajo. Sostiene bandera para nuevos.'},
            {id: 11, type: 'vol', zone: 'ZONA 3', label: 'ZONA 3 - PUESTO #11', radio: '-', g: {t:52, l:50}, z: {t:80, l:35}, task: 'Semáforo Escalera Izquierda. Coordina salida a baños. En salida hace la "L" con el lazo para ampliar flujo.'},
            {id: 12, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #12', radio: 'RADIO', g: {t:58, l:70}, z: {t:65, l:70}, task: 'Lado Derecho. Ubicación abajo-arriba. 2 forros negros. Capas lluvia alternas. Salida alterna: una fila derecha, otra izquierda.'},
            {id: 13, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #13', radio: '-', g: {t:65, l:72}, z: {t:78, l:75}, task: 'Apoya logística. Guía nuevos y coloca carita feliz. Sostiene lazo arriba en salida.'},
            {id: 14, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #14', radio: 'RADIO', g: {t:58, l:48}, z: {t:65, l:30}, task: 'Lado Izquierdo. 2 paquetes capas lluvia alternando filas. 2 forros negros. Salida alterna derecha/izquierda abajo sosteniendo lazo.'},
            {id: 15, type: 'vol', zone: 'ZONA 4', label: 'ZONA 4 - PUESTO #15', radio: '-', g: {t:65, l:45}, z: {t:78, l:25}, task: 'Apoya logística y salida de nuevos. Sostiene lazo arriba en salida.'},

            // ZONA 5-6 IZQUIERDA
            {id: 16, type: 'sup', zone: 'ZONAS 5,6', label: 'SUPERVISOR IZQUIERDO', radio: 'RADIO', g: {t:21, l:51}, z: {t:10, l:50}, task: 'Asigna posiciones 16-28. Supervisa rampas, centros y caracol lobby. Controla ingreso prioritario. Reporta situaciones al Coordinador.'},
            {id: 17, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #17', radio: 'RADIO', g: {t:28, l:45}, z: {t:40, l:30}, task: 'Responsable prioritarios y sillas de ruedas. Forros negros en rampa y prioridad. Capas lluvia rampa izquierda. Salida: arriba sosteniendo lazo.'},
            {id: 18, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #18', radio: '-', g: {t:35, l:43}, z: {t:50, l:35}, task: 'Apoya reserva líderes (50 sillas). Sostiene lazo abajo en salida. Apoya nuevos a la rampa con carita feliz.'},
            {id: 19, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #19', radio: 'RADIO', g: {t:48, l:40}, z: {t:65, l:40}, task: 'Ingreso abajo-arriba sobre rampa. 3 forros negros. Capas lluvia rampa izq sobre zona 6. Sostiene lazo en salida.'},
            {id: 20, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #20', radio: '-', g: {t:55, l:38}, z: {t:75, l:45}, task: 'Apoya ingreso y ubicación. Sostiene lazo en salida.'},
            {id: 21, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #21', radio: 'RADIO', g: {t:15, l:35}, z: {t:25, l:20}, task: 'Arriba. Dirige asistentes hacia arriba. Forros negros abajo y arriba. 2-3 paquetes capas lluvia. Salida nuevos por rampa Betel.'},
            {id: 22, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #22', radio: '-', g: {t:8, l:32}, z: {t:15, l:20}, task: 'Ubicado arriba. Dirige asistentes para ser ubicados. Anima para la salida. Salida nuevos por rampa Betel.'},
            {id: 23, type: 'vol', zone: 'ZONA 5', label: 'ZONA 5 - PUESTO #23', radio: '-', g: {t:5, l:28}, z: {t:5, l:15}, task: 'Parte última de zona. Dirige acomodación. Lazo para salida de iglesia y nuevos.'},
            {id: 24, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #24', radio: '-', g: {t:12, l:40}, z: {t:20, l:50}, task: 'Ubica iglesia abajo-arriba. Forros negros fila 1 y mitad. Capas lluvia fila 1. Sostiene cuerda abajo en salida.'},
            {id: 25, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #25', radio: 'RADIO', g: {t:18, l:30}, z: {t:30, l:35}, task: 'Apoya logística. Salida: sostiene lazo arriba y dirige últimas 4 filas por rampa Betel.'},
            {id: 26, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #26', radio: 'RADIO', g: {t:30, l:18}, z: {t:45, l:20}, task: 'Arriba. Dirige asistentes hacia arriba. Forros fila 1 y mitad. Salida lazo abajo. Nuevos por rampa Betel.'},
            {id: 27, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #27', radio: '-', g: {t:22, l:12}, z: {t:35, l:15}, task: 'Arriba. Dirige acomodación en conjunto con equipo. Anima salida. Salida nuevos rampa Betel.'},
            {id: 28, type: 'vol', zone: 'ZONA 6', label: 'ZONA 6 - PUESTO #28', radio: '-', g: {t:10, l:10}, z: {t:15, l:10}, task: 'Arriba. Dirige por fila de paso hacia rincón derecho. Toma lazo y dirige salida.'}
        ];

        let currentView = 'general';

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').style.display = 
                document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
        }

        function changeView(view) {
            currentView = view;
            const map = document.getElementById('main-map');
            const title = document.getElementById('view-title');
            
            map.style.opacity = '0.2';
            
            setTimeout(() => {
                map.src = mapFiles[view];
                title.innerText = view === 'general' ? 'MAPA GENERAL' : `DETALLE ZONA ${view}`;
                map.onload = () => {
                    map.style.opacity = '1';
                    renderPins();
                };
            }, 250);

            if(window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
                document.getElementById('overlay').style.display = 'none';
            }

            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(view === 'general' ? 'GENERAL' : `ZONA ${view}`)) item.classList.add('active');
            });
        }

        function renderPins() {
            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';

            positions.forEach(p => {
                const isGeneral = currentView === 'general';
                const isMatch = p.zone.includes(`ZONA ${currentView}`);
                const isSup = p.type === 'sup' && (
                    (currentView >= 1 && currentView <= 4 && p.zone.includes('1,2,3,4')) ||
                    (currentView >= 5 && currentView <= 6 && p.zone.includes('5,6'))
                );

                if (isGeneral || isMatch || isSup) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    const coords = isGeneral ? p.g : p.z;
                    div.style.top = coords.t + '%';
                    div.style.left = coords.l + '%';
                    div.innerHTML = p.id;
                    div.onclick = (e) => { e.stopPropagation(); showInfo(p); };
                    layer.appendChild(div);
                }
            });
        }

        function showInfo(p) {
            const content = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div>
                        <h2 style="margin:0; font-size:1.4rem; color:var(--primary)">${p.label}</h2>
                        <small style="color:#666; font-weight:bold;">${p.zone}</small>
                    </div>
                    <span style="background:#000; color:#fff; padding:6px 12px; border-radius:20px; font-size:0.7rem; font-weight:bold;">
                        ${p.radio === 'RADIO' ? '📻 RADIO ACTIVO' : 'SIN RADIO'}
                    </span>
                </div>
                <div style="width:50px; height:3px; background:var(--primary); margin-bottom:20px;"></div>
                <p style="margin:0; line-height:1.7; color:#333; font-size:1rem;">${p.task}</p>
            `;
            document.getElementById('modal-content').innerHTML = content;
            document.getElementById('overlay').style.display = 'block';
            const modal = document.getElementById('modal');
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('open'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            modal.classList.remove('open');
            setTimeout(() => {
                modal.style.display = 'none';
                if(!document.getElementById('sidebar').classList.contains('open')) {
                    document.getElementById('overlay').style.display = 'none';
                }
            }, 300);
        }

        window.onload = () => changeView('general');
    </script>
</body>
</html>
