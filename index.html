<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio - Panel de Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff5500; --sup: #d00000; --bg: #111; --panel: #1a1a1a; }
        
        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Profesional */
        .sidebar { width: 280px; background: #000; border-right: 1px solid #333; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #222; }
        .sidebar-header h2 { font-size: 1.1rem; color: var(--primary); margin: 0; letter-spacing: 1px; }
        
        .menu { flex: 1; padding: 20px 0; }
        .menu-item { padding: 14px 25px; cursor: pointer; color: #999; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .menu-item i { width: 20px; text-align: center; }
        .menu-item:hover { background: #1a1a1a; color: white; }
        .menu-item.active { background: #222; color: white; border-left: 4px solid var(--primary); font-weight: 600; }

        /* Contenido */
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-bar { padding: 20px 30px; background: var(--panel); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        
        .legend { display: flex; gap: 20px; font-size: 0.85rem; }
        .legend-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        /* Contenedor de Mapa */
        .map-viewport { flex: 1; overflow: auto; padding: 40px; display: flex; justify-content: center; align-items: flex-start; background: #0a0a0a; }
        .map-container { position: relative; display: inline-block; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-radius: 4px; }
        .map-img { max-width: 100%; height: auto; display: block; }

        /* Pines */
        .pin {
            position: absolute; width: 24px; height: 24px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
            color: white; border: 2px solid #fff; transform: translate(-50%, -50%);
            cursor: pointer; transition: 0.2s; z-index: 10;
        }
        .pin:hover { transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 0 15px var(--primary); }
        .pin-sup { background: var(--sup); border-radius: 4px; }
        .pin-vol { background: var(--primary); }

        /* PopUp Clásico */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 2000; }
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; color: #111; width: 90%; max-width: 400px; 
            border-radius: 12px; z-index: 2001; overflow: hidden; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }
        
        .modal-header { padding: 20px; background: #f8f8f8; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .modal-body { padding: 30px; }
        .close-btn { background: var(--bg); color: white; border: none; width: 100%; padding: 15px; cursor: pointer; font-weight: bold; }

        @media (max-width: 768px) {
            .sidebar { display: none; } /* En móvil se puede reactivar el menu o dejarlo así por ahora */
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fa-solid fa-map-location-dot"></i> SISTEMA AUDITORIO</h2>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="loadView('general')"><i class="fa-solid fa-earth-americas"></i> Mapa General</div>
            <div class="menu-item" onclick="loadView('z1')"><i class="fa-solid fa-1"></i> Zona 1</div>
            <div class="menu-item" onclick="loadView('z2')"><i class="fa-solid fa-2"></i> Zona 2</div>
            <div class="menu-item" onclick="loadView('z3')"><i class="fa-solid fa-3"></i> Zona 3</div>
            <div class="menu-item" onclick="loadView('z4')"><i class="fa-solid fa-4"></i> Zona 4</div>
            <div class="menu-item" onclick="loadView('z5')"><i class="fa-solid fa-5"></i> Zona 5</div>
            <div class="menu-item" onclick="loadView('z6')"><i class="fa-solid fa-6"></i> Zona 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <h1 id="view-title" style="margin:0; font-size: 1.2rem; font-weight: 300;">Mapa General</h1>
            <div class="legend">
                <div class="legend-item"><div class="dot" style="background:var(--sup)"></div> Supervisor</div>
                <div class="legend-item"><div class="dot" style="background:var(--primary)"></div> Voluntario</div>
            </div>
        </header>

        <div class="map-viewport">
            <div class="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header">
            <span id="m-id" style="font-weight: bold; color: var(--primary)"></span>
            <i class="fa-solid fa-user-shield"></i>
        </div>
        <div class="modal-body">
            <h2 id="m-name" style="margin: 0 0 10px 0; font-size: 1.4rem;"></h2>
            <p id="m-desc" style="color: #666; line-height: 1.6; margin: 0;"></p>
        </div>
        <button class="close-btn" onclick="closeModal()">CERRAR PANEL</button>
    </div>

    <script>
        const appData = {
            views: {
                general: { img: 'mapas.png', title: 'MAPA GENERAL', filter: 'all' },
                z1: { img: 'zona1.png', title: 'ZONA 1 - ACCESO', filter: [1, 2, 3, 4] },
                z6: { img: 'zona6.png', title: 'ZONA 6 - RAMPA', filter: [26, 27, 28, 24, 25] }
            },
            // Coordenadas fijas de los 28 puntos
            positions: [
                {id: 1, t: 22.5, l: 72.5, type: 'sup', name: 'Laura Arias', task: 'Supervisor Derecho. Control de accesos principales y comunicación.'},
                {id: 16, t: 21.2, l: 51.5, type: 'sup', name: 'Juan Castrillón', task: 'Supervisor Izquierdo. Control de flujo en rampas y escaleras.'},
                {id: 2, t: 5.8, l: 77.8, type: 'vol', name: 'Rafael Moncaleano', task: 'Zona 1: Orientación de asistentes y apoyo en entrada.'},
                {id: 26, t: 29.5, l: 17.8, type: 'vol', name: 'Arnulfo Canchila', task: 'Zona 6: Control rampa Betel.'},
                {id: 28, t: 11.5, l: 12.2, type: 'vol', name: 'Asignado 28', task: 'Zona 6: Puerta de emergencia superior.'}
            ]
        };

        // Rellenar automáticamente los 28 para que salgan todos en el Mapa General
        for(let i=1; i<=28; i++) {
            if(!appData.positions.find(p => p.id === i)) {
                appData.positions.push({id: i, t: 40 + (Math.random()*10), l: 40 + (Math.random()*10), type: 'vol', name: `Puesto ${i}`, task: 'Asignación de logística para el evento.'});
            }
        }

        function loadView(key) {
            const v = appData.views[key] || appData.views.general;
            document.getElementById('main-map').src = v.img;
            document.getElementById('view-title').innerText = v.title;
            
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');

            const layer = document.getElementById('pins-layer');
            layer.innerHTML = '';

            appData.positions.forEach(p => {
                if(v.filter === 'all' || v.filter.includes(p.id)) {
                    const div = document.createElement('div');
                    div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                    div.style.top = p.t + '%';
                    div.style.left = p.l + '%';
                    div.innerText = p.id;
                    div.onclick = () => showInfo(p);
                    layer.appendChild(div);
                }
            });
        }

        function showInfo(p) {
            document.getElementById('m-id').innerText = `PUESTO #${p.id}`;
            document.getElementById('m-name').innerText = p.name;
            document.getElementById('m-desc').innerText = p.task;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = () => loadView('general');
    </script>
</body>
</html>
