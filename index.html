<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Logística - IDs Interactivos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; }
        .map-container { position: relative; width: 100%; max-width: 1100px; background: white; border: 1px solid #ccc; }
        .map-image { width: 100%; display: block; }

        /* Estilo para los pines con ID visible */
        .pin {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #ff5500;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.2s;
            z-index: 10;
        }
        .pin:hover { transform: scale(1.2); background: #d44700; }

        /* Pop-up / Modal */
        #modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
                 background: white; color: #333; border-radius: 12px; z-index: 1000; 
                 width: 85%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-header { padding: 15px; border-bottom: 2px solid #ff5500; font-weight: bold; }
        .modal-body { padding: 20px; font-size: 14px; line-height: 1.5; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
                   background: rgba(0,0,0,0.7); z-index: 999; }
        .close-btn { background: #333; color: white; border: none; width: 100%; padding: 12px; border-radius: 0 0 12px 12px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="map-container">
        <img src="mapas.png" class="map-image">

        <div class="pin" style="top: 15.5%; left: 77.5%;" onclick="showInfo(1)">1</div>
        <div class="pin" style="top: 25.5%; left: 69.5%;" onclick="showInfo(2)">2</div>
        <div class="pin" style="top: 27.5%; left: 71.5%;" onclick="showInfo(3)">3</div>
        <div class="pin" style="top: 31%; left: 71.5%;" onclick="showInfo(4)">4</div>
        <div class="pin" style="top: 35.5%; left: 72%;" onclick="showInfo(5)">5</div>
        <div class="pin" style="top: 40%; left: 72%;" onclick="showInfo(6)">6</div>
        <div class="pin" style="top: 45%; left: 71.3%;" onclick="showInfo(7)">7</div>
        <div class="pin" style="top: 50.5%; left: 71.3%;" onclick="showInfo(9)">9</div>
        <div class="pin" style="top: 14.5%; left: 45.2%;" onclick="showInfo(13)">13</div>
        <div class="pin" style="top: 28%; left: 46.5%;" onclick="showInfo(17)">17</div>
        <div class="pin" style="top: 33.5%; left: 46.5%;" onclick="showInfo(18)">18</div>
        <div class="pin" style="top: 43.5%; left: 47%;" onclick="showInfo(19)">19</div>
        <div class="pin" style="top: 55%; left: 47.5%;" onclick="showInfo(21)">21</div>
        <div class="pin" style="top: 32%; left: 24.5%;" onclick="showInfo(24)">24</div>
        <div class="pin" style="top: 42%; left: 28.5%;" onclick="showInfo(25)">25</div>
        <div class="pin" style="top: 14.5%; left: 20.2%;" onclick="showInfo(26)">26</div>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header" id="m-title"></div>
        <div class="modal-body" id="m-body"></div>
        <button class="close-btn" onclick="closeModal()">CERRAR</button>
    </div>

    <script>
        const data = {
            1: { t: "Puesto 1: Supervisor Derecho", d: "Laura Daniela Arias Fontecha. Supervisa zonas 1, 2, 3 y 4. Realiza check-in y coordina voluntarios." },
            2: { t: "Puesto 2: Zona 1", d: "Rafael Moncaleano / Gloria Parra. Ubicación de abajo hacia arriba. Papás SPK." },
            3: { t: "Puesto 3: Zona 2 Abajo", d: "Marleny Masmela. Reserva sillas alabanza. Dirige salida de nuevos." },
            13: { t: "Puesto 13: Zona 4 Derecha", d: "Jose Carrillo. Responsable de zona. Ubica capas de lluvia." },
            26: { t: "Puesto 26: Zona 6 Arriba", d: "Arnulfo Canchila. Dirige hacia parte superior. Salida por rampa Betel." }
            // Los demás datos se mantienen igual...
        };

        function showInfo(id) {
            const item = data[id] || { t: `Puesto ${id}`, d: "Información de función pendiente." };
            document.getElementById('m-title').innerText = item.t;
            document.getElementById('m-body').innerText = item.d;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
