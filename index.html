<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística Auditorio - Panel Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #ff5500; 
            --primary-glow: rgba(255, 85, 0, 0.4);
            --sup: #d00000; 
            --sup-glow: rgba(208, 0, 0, 0.4);
            --bg: #0a0a0a; 
            --sidebar: #000; 
            --card: #1a1a1a; 
        }
        
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar Fija y Profesional */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid #222; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-header { padding: 30px 20px; border-bottom: 1px solid #222; text-align: center; }
        .sidebar-header h2 { font-size: 1rem; color: var(--primary); margin: 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .menu { flex: 1; padding: 20px 0; overflow-y: auto; }
        .menu-item { padding: 14px 25px; cursor: pointer; color: #888; display: flex; align-items: center; gap: 12px; transition: all 0.3s; border-left: 4px solid transparent; }
        .menu-item i { width: 20px; font-size: 1.1rem; }
        .menu-item:hover { background: #111; color: white; }
        .menu-item.active { background: #1a1a1a; color: white; border-left-color: var(--primary); font-weight: bold; }

        /* Contenido Principal */
        .main { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        
        /* Barra Superior */
        .top-bar { padding: 0 30px; height: 70px; background: var(--card); border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .legend { display: flex; gap: 20px; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: #bbb; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); }

        /* Visor de Mapa */
        .map-viewport { flex: 1; overflow: auto; padding: 40px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%); }
        .map-container { position: relative; display: inline-block; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 1px solid #333; transition: transform 0.3s ease; }
        .map-img { display: block; max-width: 85vw; max-height: 75vh; height: auto; width: auto; }

        /* PINES MÁS GRANDES Y MEJORADOS */
        .pin {
            position: absolute; 
            width: 32px; /* Aumentado de 22px */
            height: 32px; /* Aumentado de 22px */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center; 
            font-size: 12px; font-weight: 800;
            color: white; border: 2px solid #fff; 
            transform: translate(-50%, -50%);
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Efecto de Pulso para visibilidad */
        .pin::after {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            animation: pulse 2s infinite;
            z-index: -1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .pin:hover { 
            transform: translate(-50%, -50%) scale(1.3); 
            z-index: 100; 
            box-shadow: 0 0 20px #fff;
        }

        .pin-sup { background: var(--sup); border-radius: 6px; }
        .pin-sup::after { background: var(--sup-glow); }
        
        .pin-vol { background: var(--primary); }
        .pin-vol::after { background: var(--primary-glow); }

        /* PopUp */
        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); z-index: 1000; }
        #modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #111; width: 90%; max-width: 400px; border-radius: 16px; z-index: 1001; 
            overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translate(-50%, -40%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        .modal-header { padding: 20px; background: #f8f8f8; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 30px; }
        .close-btn { background: #000; color: white; border: none; width: 100%; padding: 18px; cursor: pointer; font-weight: bold; font-size: 1rem; letter-spacing: 1px; transition: background 0.2s; }
        .close-btn:hover { background: var(--primary); }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Auditorio Monitor</h2>
        </div>
        <div class="menu">
            <div class="menu-item active" onclick="loadView('general')"><i class="fas fa-th-large"></i> Mapa General</div>
            <div class="menu-item" onclick="loadView('z1')"><i class="fas fa-door-open"></i> Zona 1</div>
            <div class="menu-item" onclick="loadView('z2')"><i class="fas fa-chair"></i> Zona 2</div>
            <div class="menu-item" onclick="loadView('z3')"><i class="fas fa-users"></i> Zona 3</div>
            <div class="menu-item" onclick="loadView('z4')"><i class="fas fa-exchange-alt"></i> Zona 4</div>
            <div class="menu-item" onclick="loadView('z5')"><i class="fas fa-chevron-right"></i> Zona 5</div>
            <div class="menu-item" onclick="loadView('z6')"><i class="fas fa-road"></i> Zona 6</div>
        </div>
    </aside>

    <main class="main">
        <header class="top-bar">
            <h1 id="view-title" style="margin:0; font-weight: 300; font-size: 1.1rem; letter-spacing: 1px;">MAPA GENERAL</h1>
            <div class="legend">
                <div class="legend-item"><div class="dot" style="background:var(--sup)"></div> Supervisor</div>
                <div class="legend-item"><div class="dot" style="background:var(--primary)"></div> Voluntario</div>
            </div>
        </header>

        <div class="map-viewport">
            <div class="map-container">
                <img src="mapas.png" id="main-map" class="map-img">
                <div id="pins-layer"></div>
            </div>
        </div>
    </main>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="modal">
        <div class="modal-header">
            <span id="m-id" style="font-weight: bold; color: var(--primary); font-size: 0.8rem; text-transform: uppercase;"></span>
            <i class="fas fa-user-circle" style="color:#ddd; font-size: 1.5rem;"></i>
        </div>
        <div class="modal-body">
            <h2 id="m-name" style="margin: 0 0 12px 0; font-size: 1.5rem; letter-spacing: -0.5px; color: #000;"></h2>
            <div style="width: 30px; height: 3px; background: var(--primary); margin-bottom: 15px;"></div>
            <p id="m-task" style="color: #444; font-size: 1rem; line-height: 1.6; margin: 0;"></p>
        </div>
        <button class="close-btn" onclick="closeModal()">ENTENDIDO</button>
    </div>

    <script>
        const appData = {
            views: {
                general: { img: 'mapas.png', title: 'MAPA GENERAL', filter: 'all' },
                z1: { img: 'zona1.png', title: 'VISTA: ZONA 1', filter: [1, 2] },
                z2: { img: 'zona2.png', title: 'VISTA: ZONA 2', filter: [3, 4, 5, 6] },
                z3: { img: 'zona3.png', title: 'VISTA: ZONA 3', filter: [7, 8, 9, 10, 11] },
                z4: { img: 'zona4.png', title: 'VISTA: ZONA 4', filter: [12, 13, 14, 15] },
                z5: { img: 'zona5.png', title: 'VISTA: ZONA 5', filter: [16, 17, 18, 19, 20] },
                z6: { img: 'zona6.png', title: 'VISTA: ZONA 6', filter: [21, 22, 23, 24, 25, 26, 27, 28] }
            },
            positions: [
                {id: 1, t: 22.1, l: 72.3, type: 'sup', name: 'Laura Daniela Arias', task: 'Supervisor Derecho. Responsable de coordinación de radio y check-in zonas 1-4.'},
                {id: 16, t: 21.0, l: 51.3, type: 'sup', name: 'Juan Carlos Castrillón', task: 'Supervisor Izquierdo. Control de flujo en rampas y caracol lobby.'},
                {id: 2, t: 6.0, l: 77.8, type: 'vol', name: 'Rafael Moncaleano', task: 'Zona 1: Orientación inicial y papás SPK.'},
                {id: 3, t: 25.0, l: 73.5, type: 'vol', name: 'Marleny Masmela', task: 'Zona 2: Sillas de alabanza y control de lazo.'},
                {id: 4, t: 38.0, l: 76.0, type: 'vol', name: 'Edith Pertuz', task: 'Zona 2: Apoyo en pasillo derecho.'},
                {id: 7, t: 26.0, l: 69.0, type: 'vol', name: 'Maritriny Barrera', task: 'Zona 3: Reservas Comité y Staff.'},
                {id: 9, t: 48.0, l: 74.0, type: 'vol', name: 'Marcela Páez', task: 'Zona 3: Semáforo de escaleras y flujo baños.'},
                {id: 17, t: 26.0, l: 47.5, type: 'vol', name: 'Sonia Patricia López', task: 'Zona 5: Prioritarios y rampa zona 6.'},
                {id: 19, t: 48.0, l: 39.5, type: 'vol', name: 'July Jiménez', task: 'Zona 5: Ingreso rampa y forros negros.'},
                {id: 26, t: 30.0, l: 17.5, type: 'vol', name: 'Arnulfo Canchila', task: 'Zona 6: Rampa Betel y entrega de caritas felices.'}
            ]
        };

        // Rellenar puestos genéricos faltantes
        for(let i=1; i<=28; i++) {
            if(!appData.positions.find(p => p.id === i)) {
                appData.positions.push({
                    id: i, 
                    t: 15 + (Math.random() * 70), 
                    l: 15 + (Math.random() * 70), 
                    type: 'vol', 
                    name: `Puesto de Apoyo ${i}`, 
                    task: 'Asignación logística general. Control de accesos y apoyo a supervisores de zona.'
                });
            }
        }

        function loadView(key) {
            const v = appData.views[key] || appData.views.general;
            const img = document.getElementById('main-map');
            const layer = document.getElementById('pins-layer');
            const title = document.getElementById('view-title');
            
            img.style.opacity = '0.3';
            img.src = v.img;
            title.innerText = v.title;
            
            img.onload = () => {
                img.style.opacity = '1';
                layer.innerHTML = '';
                appData.positions.forEach(p => {
                    if(v.filter === 'all' || v.filter.includes(p.id)) {
                        const div = document.createElement('div');
                        div.className = `pin ${p.type === 'sup' ? 'pin-sup' : 'pin-vol'}`;
                        div.style.top = p.t + '%';
                        div.style.left = p.l + '%';
                        div.innerHTML = `<span>${p.id}</span>`;
                        div.onclick = (e) => {
                            e.stopPropagation();
                            showInfo(p);
                        };
                        layer.appendChild(div);
                    }
                });
            };

            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            const activeItem = Array.from(document.querySelectorAll('.menu-item')).find(m => m.innerText.toLowerCase().includes(key.toLowerCase()) || (key === 'general' && m.innerText.includes('General')));
            if(activeItem) activeItem.classList.add('active');
        }

        function showInfo(p) {
            document.getElementById('m-id').innerText = `ID Posición: #${p.id}`;
            document.getElementById('m-name').innerText = p.name;
            document.getElementById('m-task').innerText = p.task;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        window.onload = () => loadView('general');
    </script>
</body>
</html>
